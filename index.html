    /* ─── UTILS ─────────────────────────────────────────────────── */
    const fmt      = n => (n||0).toLocaleString("th-TH");

    const thDate   = d => { if(!d)return "-"; return new Date(d).toLocaleDateString("th-TH",{day:"numeric",month:"short",year:"numeric"}); };
    const nowTs    = () => new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});
    const addMonths= (ds,m) => { const d=new Date(ds); d.setMonth(d.getMonth()+m); return d.toISOString().slice(0,10); };
    const daysLeft = ed => { const n=new Date(); n.setHours(0,0,0,0); const e=new Date(ed); e.setHours(0,0,0,0); return Math.ceil((e-n)/86400000); };

    /* ─── AUTO-CODE GENERATOR ───────────────────────────────────── */
    const genNextCode = (products, prefix="BZ") => {
      const nums = products
        .map(p => p.code)
        .filter(c => c && c.toUpperCase().startsWith(prefix.toUpperCase()))
        .map(c => parseInt(c.slice(prefix.length), 10))
        .filter(n => !isNaN(n));
      const next = nums.length > 0 ? Math.max(...nums)+1 : 1;
      return `${prefix}${String(next).padStart(3,"0")}`;
    };

    /* ─── FIRESTORE COLLECTION HOOK ────────────────────────────────
       แต่ละรายการเป็น document ของตัวเอง ไม่มีขีดจำกัด
    ─────────────────────────────────────────────────────────────── */
    function useCollection(colName, def) {
      const lsKey = "benz_" + colName;
      const useFirebase = !!_db;

      const [lsVal, setLsVal] = useState(() => {
        try { const s = localStorage.getItem(lsKey); return s ? JSON.parse(s) : def; } catch { return def; }
      });
      const [fbItems, setFbItems] = useState([]);
      const [loaded, setLoaded]   = useState(!useFirebase);
      const prevRef               = useRef([]);

      useEffect(() => {
        if (!useFirebase) return;
        const unsub = _db.collection(colName).onSnapshot(snap => {
          const items = snap.docs.map(d => d.data()._v).filter(Boolean);
          prevRef.current = items;
          setFbItems(items);
          setLoaded(true);
        }, err => { console.warn("Col error:", colName, err); setLoaded(true); });
        return unsub;
      }, [colName, useFirebase]);

      const setVal = (updater) => {
        const prev = useFirebase ? prevRef.current : lsVal;
        const next = typeof updater === "function" ? updater(prev) : updater;

        if (!useFirebase) {
          setLsVal(next);
          try { localStorage.setItem(lsKey, JSON.stringify(next)); } catch {}
          return;
        }

        // Optimistic update
        prevRef.current = next;
        setFbItems(next);

        // Diff — เขียนเฉพาะที่เปลี่ยน/เพิ่ม/ลบ
        const prevMap = new Map(prev.map(x => [String(x.id), x]));
        const nextMap = new Map(next.map(x => [String(x.id), x]));
        const batch   = _db.batch();
        let ops = 0;

        // ลบรายการที่หายไป
        prevMap.forEach((_, id) => {
          if (!nextMap.has(id)) {
            batch.delete(_db.collection(colName).doc(id));
            ops++;
          }
        });
        // เพิ่ม/อัปเดตรายการที่เปลี่ยน
        nextMap.forEach((item, id) => {
          const old = prevMap.get(id);
          if (!old || JSON.stringify(old) !== JSON.stringify(item)) {
            batch.set(_db.collection(colName).doc(id), { _v: item });
            ops++;
          }
        });

        if (ops > 0) batch.commit().catch(e => console.error("Batch err:", colName, e));
      };

      return [useFirebase ? fbItems : lsVal, setVal, loaded];
    }

    /* ─── FIRESTORE SINGLE-DOC HOOK (สำหรับ users, shopname) ───── */
    function useFirestore(key, def) {
      const lsKey = "benz_" + key;
      const useFirebase = !!_db;

      const [lsVal, setLsVal] = useState(() => {
        try { const s = localStorage.getItem(lsKey); return s ? JSON.parse(s) : def; } catch { return def; }
      });
      const [fbVal, setFbVal]   = useState(def);
      const [loaded, setLoaded] = useState(!useFirebase);
      const valRef              = useRef(def);
      const isFirst             = useRef(true);

      useEffect(() => {
        if (!useFirebase) return;
        const ref = _db.collection("benz_config").doc(key);
        const unsub = ref.onSnapshot(snap => {
          if (snap && snap.exists && snap.data() && snap.data().v !== undefined) {
            valRef.current = snap.data().v;
            setFbVal(snap.data().v);
          } else if (isFirst.current) {
            valRef.current = def;
            setFbVal(def);
          }
          isFirst.current = false;
          setLoaded(true);
        }, err => { console.warn("Doc error:", key, err); setLoaded(true); });
        return unsub;
      }, [key, useFirebase]);

      const setVal = (updater) => {
        if (useFirebase) {
          const next = typeof updater === "function" ? updater(valRef.current) : updater;
          valRef.current = next;
          setFbVal(next);
          _db.collection("benz_config").doc(key).set({ v: next }).catch(e => console.error("Save error:", key, e));
        } else {
          setLsVal(prev => {
            const next = typeof updater === "function" ? updater(prev) : updater;
            try { localStorage.setItem(lsKey, JSON.stringify(next)); } catch {}
            return next;
          });
        }
      };

      return [useFirebase ? fbVal : lsVal, setVal, loaded];
    }

      if(type==="products"){
        const ws=XLSX.utils.aoa_to_sheet([["รหัส","ชื่อสินค้า","หมวดหมู่","ราคา","สต๊อก","หน่วย","สต๊อกขั้นต่ำ"]]);
        ws["!cols"]=[8,30,12,10,8,8,12].map(w=>({wch:w}));
        XLSX.utils.book_append_sheet(wb,ws,"สต๊อกสินค้า");
        XLSX.writeFile(wb,"Template_นำเข้าสินค้า.xlsx");
      } else {
        const ws=XLSX.utils.aoa_to_sheet([["ลูกค้า","เบอร์โทร","ทะเบียน","สินค้า/งาน","ประเภท(install/product)","วันที่ขาย","ระยะ(เดือน)","หมายเหตุ"]]);
        ws["!cols"]=[20,14,14,25,16,12,14,20].map(w=>({wch:w}));
        XLSX.utils.book_append_sheet(wb,ws,"ประกัน");
        XLSX.writeFile(wb,"Template_นำเข้าประกัน.xlsx");
      }
    }

    /* ─── PRINT BARCODES ────────────────────────────────────────── */
    function printBarcodes(items, shopName="BENZ ประดับยนต์") {
      // items = [{code, name, qty}]
      const zone = document.getElementById("barcode-print-zone");
      // Build HTML with one label per qty
      let html = `<div style="font-family:'Sarabun',sans-serif;padding:6mm;">`;
      html += `<div style="font-size:11pt;font-weight:800;margin-bottom:6mm;color:#000">${shopName} — บาร์โค้ดสินค้า</div>`;
      html += `<div style="display:flex;flex-wrap:wrap;gap:4mm;">`;
      items.forEach(item => {
        for (let i = 0; i < (item.qty||1); i++) {
          html += `<div class="bc-label"><svg id="bc-${item.code}-${i}"></svg><div class="bc-name">${item.name}</div></div>`;
        }
      });
      html += `</div></div>`;
      zone.innerHTML = html;
      // Render barcodes via JsBarcode
      items.forEach(item => {
        for (let i = 0; i < (item.qty||1); i++) {
          try {
            JsBarcode(`#bc-${item.code}-${i}`, item.code, {
              format: "CODE128", width: 1.8, height: 40, displayValue: true,
              fontSize: 11, fontOptions: "bold", margin: 4, background: "#fff", lineColor: "#000"
            });
          } catch(e) {}
        }
      });
      setTimeout(() => { window.print(); zone.innerHTML = ""; }, 300);
    }

    /* ─── BACKUP / RESTORE ──────────────────────────────────────── */
    const BACKUP_KEYS = ["benz_products","benz_transactions","benz_warranties","benz_users","benz_shopname"];

    function doBackup(data) {
      const out = {
        benz_products:     data.products     || [],
        benz_transactions: data.transactions || [],
        benz_warranties:   data.warranties   || [],
        benz_users:        data.users        || [],
        _backupDate: new Date().toISOString(),
        _version: "2.0-firebase"
      };
      const blob = new Blob([JSON.stringify(out, null, 2)], { type:"application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `BENZ_Backup_${today()}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function doRestore(file, callbacks) {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = JSON.parse(e.target.result);
          // validate
          if (!data.benz_products) throw new Error("ไฟล์ไม่ถูกต้อง ไม่พบข้อมูลสินค้า");
          const info = {
            products:     (data.benz_products||[]).length,
            transactions: (data.benz_transactions||[]).length,
            warranties:   (data.benz_warranties||[]).length,
            users:        (data.benz_users||[]).length,
            backupDate:   data._backupDate ? new Date(data._backupDate).toLocaleString("th-TH") : "ไม่ทราบ",
          };
          callbacks.onPreview(data, info);
        } catch(err) {
          alert("❌ อ่านไฟล์ Backup ไม่ได้: " + err.message);
        }
      };
      reader.readAsText(file);
    }

    /* ─── EXCEL IMPORT PARSER ───────────────────────────────────── */
    function parseXLSX(file) {
      return new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=e=>{ try{ const wb=XLSX.read(e.target.result,{type:"binary",cellDates:true}); res(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""})); }catch(err){rej(err);} };
        r.onerror=()=>rej(new Error("อ่านไฟล์ไม่ได้"));
        r.readAsBinaryString(file);
      });
    }

            setPreview(rows.map(r=>{
              const code=String(r["รหัส"]||"").trim(), name=String(r["ชื่อสินค้า"]||"").trim();
              if(!code||!name) return {_status:"err",_msg:"ไม่มีรหัสหรือชื่อสินค้า"};
              const ex=products.find(p=>p.code===code);
              return {_code:code,_name:name,_price:parseFloat(r["ราคา"])||0,_stock:parseInt(r["สต๊อก"])||0,
                _cat:String(r["หมวดหมู่"]||"ทั่วไป"),_unit:String(r["หน่วย"]||"ชิ้น"),_min:parseInt(r["สต๊อกขั้นต่ำ"])||5,
                _status:ex?"upd":"ok",_msg:ex?`อัปเดต (สต๊อกเดิม ${ex.stock})`:"เพิ่มใหม่"};
            }));
          } else {
            setPreview(rows.map(r=>{
              const cust=String(r["ลูกค้า"]||"").trim(),prod=String(r["สินค้า/งาน"]||"").trim(),date=String(r["วันที่ขาย"]||"").trim();

              const tp=String(r["ประเภท(install/product)"]||"install").trim();
              return {_cust:cust,_phone:String(r["เบอร์โทร"]||""),_plate:String(r["ทะเบียน"]||""),
                _prod:prod,_type:tp==="product"?"product":"install",_date:date,
                _months:parseInt(r["ระยะ(เดือน)"])||12,_note:String(r["หมายเหตุ"]||""),
                _status:"ok",_msg:"เพิ่มใหม่"};
            }));
          }

      };

        if(importType==="products") onImportProducts(valid);
        else onImportWarranties(valid);
        setSummary({added:valid.filter(r=>r._status==="ok").length,updated:valid.filter(r=>r._status==="upd").length,err:preview.filter(r=>r._status==="err").length});

            </div>

                    <button key={v} onClick={()=>setType(v)} style={{padding:"13px 8px",borderRadius:12,border:`2px solid ${importType===v?"#ff6b00":"#2a2a2a"}`,background:importType===v?"rgba(255,107,0,.1)":"#161616",color:importType===v?"#ff9500":"#888",cursor:"pointer",fontWeight:700,fontSize:13}}>{l}</button>

              {step==="preview"&&<>

                        {importType==="products"?`${r._code||"?"} — ${r._name||"?"}`:`${r._cust||"?"} — ${r._prod||"?"}`}
                      </div>
                      <div style={{color:"#555",marginTop:2}}>{r._msg}</div>
                      {importType==="products"&&r._status!=="err"&&<div style={{color:"#444",fontSize:11}}>ราคา ฿{fmt(r._price)} | สต๊อก {r._stock} {r._unit}</div>}

              <div style={{fontSize:11,color:"#666",marginBottom:6,textAlign:"center"}}>หรือกรอกรหัสด้วยตนเอง</div>

                <input value={manual} onChange={e=>setManual(e.target.value)} onKeyDown={e=>e.key==="Enter"&&manual.trim()&&onScan(manual.trim())} placeholder="BZ001"
                  style={{flex:1,padding:"10px 12px",borderRadius:8,border:"1px solid #333",background:"#1a1a1a",color:"#fff",fontSize:13}}/>
                <button onClick={()=>manual.trim()&&onScan(manual.trim())} style={{padding:"10px 16px",borderRadius:8,border:"none",background:"#ff6b00",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>ค้นหา</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════
       BARCODE MODAL
    ══════════════════════════════════════════════════════════════ */
    function BarcodeModal({products, shopName, onClose}) {
      const [selected, setSelected] = useState({}); // {id: qty}
      const [search, setSearch] = useState("");
      const bcRefs = useRef({});

      // render preview barcodes after selection changes
      useEffect(() => {
        Object.keys(selected).forEach(id => {
          const p = products.find(x => x.id === parseInt(id));
          if (!p) return;
          const el = document.getElementById(`preview-bc-${id}`);
          if (!el) return;
          try {
            JsBarcode(el, p.code, {
              format:"CODE128", width:1.6, height:36, displayValue:true,
              fontSize:10, margin:4, background:"transparent", lineColor:"#fff"
            });
          } catch(e){}
        });
      }, [selected, products]);

      const toggle = id => {
        setSelected(prev => {
          const n = {...prev};
          if (n[id]) delete n[id]; else n[id] = 1;
          return n;
        });
      };
      const setQty = (id, v) => setSelected(prev => ({...prev, [id]: Math.max(1, parseInt(v)||1)}));
      const selectAll = () => { const n={}; filtered.forEach(p=>n[p.id]=1); setSelected(n); };
      const clearAll  = () => setSelected({});

      const filtered = products.filter(p =>
        p.name.toLowerCase().includes(search.toLowerCase()) ||
        p.code.toLowerCase().includes(search.toLowerCase())
      );
      const selectedList = products.filter(p => selected[p.id]);
      const totalLabels  = selectedList.reduce((s,p) => s + (selected[p.id]||1), 0);

      const doPrint = () => {
        if (!selectedList.length) return;
        const items = selectedList.map(p => ({ code: p.code, name: p.name, qty: selected[p.id]||1 }));
        printBarcodes(items, shopName);
      };

      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.93)",zIndex:300,display:"flex",alignItems:"flex-end"}}>
          <div style={{background:"#111",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:440,margin:"0 auto",maxHeight:"94vh",display:"flex",flexDirection:"column",border:"1px solid #2a2a2a"}}>
            {/* Header */}
            <div style={{padding:"16px 20px 12px",borderBottom:"1px solid #222",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
              <div>
                <div style={{fontSize:15,fontWeight:700}}>🏷️ พิมพ์บาร์โค้ดสินค้า</div>
                {totalLabels>0&&<div style={{fontSize:11,color:"#ff9500",marginTop:2}}>เลือก {selectedList.length} รายการ · {totalLabels} ป้าย</div>}
              </div>
              <button onClick={onClose} style={{background:"#222",border:"none",color:"#aaa",fontSize:16,cursor:"pointer",borderRadius:8,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>

            {/* Search + actions */}
            <div style={{padding:"10px 16px 0",flexShrink:0}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 ค้นหาสินค้า..."
                style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #333",background:"#1a1a1a",color:"#fff",fontSize:13,marginBottom:8}}/>
              <div style={{display:"flex",gap:8,marginBottom:10}}>
                <button onClick={selectAll} style={{flex:1,padding:"7px 0",borderRadius:7,border:"1px solid #ff6b0044",background:"rgba(255,107,0,.08)",color:"#ff9500",fontSize:12,fontWeight:700,cursor:"pointer"}}>เลือกทั้งหมด</button>
                <button onClick={clearAll}  style={{flex:1,padding:"7px 0",borderRadius:7,border:"1px solid #33333388",background:"#1a1a1a",color:"#666",fontSize:12,fontWeight:700,cursor:"pointer"}}>ล้างการเลือก</button>
              </div>
            </div>

            {/* Product list */}
            <div style={{flex:1,overflowY:"auto",padding:"0 16px 8px"}}>
              {filtered.map(p => {
                const isOn = !!selected[p.id];
                return (
                  <div key={p.id} style={{background:isOn?"#1a0a00":"#161616",border:`1px solid ${isOn?"#ff6b0066":"#222"}`,borderRadius:10,padding:"10px 12px",marginBottom:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      {/* Checkbox */}
                      <div onClick={()=>toggle(p.id)} style={{width:22,height:22,borderRadius:6,border:`2px solid ${isOn?"#ff6b00":"#444"}`,background:isOn?"#ff6b00":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
                        {isOn&&<span style={{color:"#fff",fontSize:13,fontWeight:800}}>✓</span>}
                      </div>
                      <div style={{flex:1,cursor:"pointer"}} onClick={()=>toggle(p.id)}>
                        <div style={{display:"flex",gap:5,alignItems:"center",marginBottom:2}}>
                          <span style={{fontSize:10,background:"#ff6b00",color:"#fff",padding:"1px 6px",borderRadius:4,fontWeight:700}}>{p.code}</span>
                        </div>
                        <div style={{fontSize:13,fontWeight:600}}>{p.name}</div>
                      </div>
                      {/* Qty */}
                      {isOn&&(
                        <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
                          <button onClick={()=>setQty(p.id,(selected[p.id]||1)-1)} style={{width:24,height:24,borderRadius:5,border:"1px solid #333",background:"#222",color:"#aaa",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                          <span style={{minWidth:22,textAlign:"center",fontWeight:700,color:"#ff9500",fontSize:14}}>{selected[p.id]||1}</span>
                          <button onClick={()=>setQty(p.id,(selected[p.id]||1)+1)} style={{width:24,height:24,borderRadius:5,border:"1px solid #333",background:"#222",color:"#aaa",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                          <span style={{fontSize:10,color:"#555"}}>ป้าย</span>
                        </div>
                      )}
                    </div>
                    {/* Barcode preview */}
                    {isOn&&(
                      <div style={{marginTop:10,background:"#0d0d0d",borderRadius:8,padding:"10px",textAlign:"center",border:"1px solid #222"}}>
                        <svg id={`preview-bc-${p.id}`}></svg>
                        <div style={{fontSize:9,color:"#555",marginTop:4}}>ตัวอย่างบาร์โค้ด</div>
                      </div>
                    )}
                  </div>
                );
              })}
              {filtered.length===0&&<div style={{color:"#333",fontSize:13,textAlign:"center",padding:"24px 0"}}>ไม่พบสินค้า</div>}
            </div>

            {/* Print button */}
            <div style={{padding:"12px 16px 24px",borderTop:"1px solid #222",flexShrink:0}}>
              <button onClick={doPrint} disabled={!selectedList.length}
                style={{width:"100%",padding:14,borderRadius:10,border:"none",cursor:selectedList.length?"pointer":"not-allowed",background:selectedList.length?"linear-gradient(135deg,#ff6b00,#ff9500)":"#222",color:selectedList.length?"#fff":"#444",fontSize:14,fontWeight:700,boxShadow:selectedList.length?"0 4px 15px rgba(255,107,0,.35)":"none"}}>
                🖨️ พิมพ์บาร์โค้ด {totalLabels>0?`(${totalLabels} ป้าย)`:""}
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════
       BACKUP / RESTORE MODAL
    ══════════════════════════════════════════════════════════════ */
    function BackupModal({onClose,onBackup,setProducts,setTxs,setWarranties,setUsers,toast_}) {
      const [step,setStep]       = useState("main"); // main | preview | done

      const [rawData,setRawData] = useState(null);
      const fileRef = useRef();

      const handleFile = file => {
        if (!file) return;
        doRestore(file, {
          onPreview: (data, info) => { setRawData(data); setPreview(info); setStep("preview"); }
        });
      };

      const confirmRestore = () => {
        if (!rawData) return;
        if (rawData.benz_products)     setProducts(rawData.benz_products);
        if (rawData.benz_transactions) setTxs(rawData.benz_transactions);
        if (rawData.benz_warranties)   setWarranties(rawData.benz_warranties);
        if (rawData.benz_users)        setUsers(rawData.benz_users);
        setStep("done");
        toast_("✅ Restore ข้อมูลสำเร็จ!");
      };

      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.93)",zIndex:300,display:"flex",alignItems:"flex-end"}}>
          <div style={{background:"#111",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:440,margin:"0 auto",maxHeight:"88vh",display:"flex",flexDirection:"column",border:"1px solid #2a2a2a"}}>
            <div style={{padding:"16px 20px 12px",borderBottom:"1px solid #222",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>

              <button onClick={onClose} style={{background:"#222",border:"none",color:"#aaa",fontSize:16,cursor:"pointer",borderRadius:8,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>

            <div style={{flex:1,overflowY:"auto",padding:"16px 20px 24px",display:"flex",flexDirection:"column",gap:12}}>

              {step==="main"&&<>
                {/* Backup section */}
                <div style={{background:"#0d0d0d",borderRadius:12,padding:14,border:"1px solid #1a3a1a"}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#00cc66",marginBottom:6}}>💾 สำรองข้อมูล (Backup)</div>
                  <div style={{fontSize:12,color:"#555",marginBottom:12,lineHeight:1.6}}>
                    บันทึกข้อมูลทั้งหมดเป็นไฟล์ .json ไว้ที่เครื่อง<br/>
                    ได้แก่ สต๊อกสินค้า, ประวัติการขาย, ประกัน, ผู้ใช้งาน

                    ⬇️ ดาวน์โหลด Backup ทันที
                  </button>
                  <div style={{fontSize:10,color:"#333",marginTop:8,textAlign:"center"}}>แนะนำให้ Backup ทุกวันหรือก่อนอัปเดตไฟล์</div>
                </div>

                {/* Restore section */}
                <div style={{background:"#0d0d0d",borderRadius:12,padding:14,border:"1px solid #1a1a3a"}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#00aaff",marginBottom:6}}>📂 กู้คืนข้อมูล (Restore)</div>
                  <div style={{fontSize:12,color:"#555",marginBottom:12,lineHeight:1.6}}>
                    โหลดไฟล์ Backup .json เพื่อกู้ข้อมูลกลับมา<br/>
                    <span style={{color:"#ff6666"}}>⚠️ ข้อมูลปัจจุบันจะถูกแทนที่ทั้งหมด</span>
                  </div>
                  <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
                  <button onClick={()=>fileRef.current.click()} style={{width:"100%",padding:13,borderRadius:10,border:"2px dashed #00aaff44",background:"rgba(0,170,255,.06)",color:"#00aaff",fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                    📁 เลือกไฟล์ Backup (.json)

                    ["👤 ผู้ใช้",  preview.users,        "#aa66ff"],
                  ].map(([l,n,c])=>(
                    <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #1a1a1a",alignItems:"center"}}>
                      <span style={{fontSize:13,color:"#aaa"}}>{l}</span>
                      <span style={{fontSize:15,fontWeight:800,color:c}}>{n} รายการ</span>
                    </div>
                  ))}
                </div>
                <div style={{background:"rgba(255,51,51,.08)",border:"1px solid #ff333344",borderRadius:10,padding:12,fontSize:12,color:"#ff8888"}}>
                  ⚠️ การ Restore จะ <strong>แทนที่ข้อมูลทั้งหมด</strong>ที่มีอยู่ในระบบ ด้วยข้อมูลจากไฟล์ Backup นี้
                </div>
                <button onClick={confirmRestore} style={{width:"100%",padding:14,borderRadius:10,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#ff6b00,#ff9500)",color:"#fff",fontSize:14,fontWeight:700}}>
                  ✅ ยืนยัน Restore ข้อมูลทั้งหมด
                </button>
              </>}

              {step==="done"&&<>
                <div style={{textAlign:"center",padding:"28px 0"}}>
                  <div style={{fontSize:52,marginBottom:12}}>🎉</div>
                  <div style={{fontSize:18,fontWeight:800,marginBottom:8}}>Restore สำเร็จ!</div>
                  <div style={{fontSize:13,color:"#888"}}>ข้อมูลทั้งหมดถูกกู้คืนแล้ว</div>
                </div>
                <button onClick={onClose} style={{width:"100%",padding:14,borderRadius:10,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#ff6b00,#ff9500)",color:"#fff",fontSize:14,fontWeight:700}}>✓ ปิด</button>
              </>}
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════
       USER MANAGEMENT
    ══════════════════════════════════════════════════════════════ */
    function UserManagement({users,setUsers,currentUser,onClose}) {
      const [form,setForm]     = useState({role:"staff"});
      const [editId,setEditId] = useState(null);
      const [err,setErr]       = useState("");
      const [showPw,setShowPw] = useState({});

      const reset = () => { setForm({role:"staff"}); setEditId(null); setErr(""); };

      const save = () => {
        const uname = (form.username||"").trim();
        const pw    = (form.password||"").trim();
        const name  = (form.name||"").trim();
        if(!uname||!pw||!name) { setErr("กรุณากรอกข้อมูลให้ครบ"); return; }
        if(uname.length < 3)   { setErr("Username ต้องมีอย่างน้อย 3 ตัวอักษร"); return; }
        if(pw.length < 4)      { setErr("Password ต้องมีอย่างน้อย 4 ตัวอักษร"); return; }
        // check duplicate username (except self when editing)
        const dup = users.find(u=>u.username===uname && u.id!==editId);
        if(dup) { setErr("Username นี้มีอยู่แล้ว"); return; }
        if(editId) {
          setUsers(prev=>prev.map(u=>u.id===editId?{...u,username:uname,password:pw,name,role:form.role||"staff"}:u));
        } else {
          setUsers(prev=>[...prev,{id:Date.now(),username:uname,password:pw,name,role:form.role||"staff"}]);
        }
        reset();
      };

      const del = id => {
        if(id===currentUser.id) { alert("ไม่สามารถลบบัญชีของตัวเองได้"); return; }
        if(!window.confirm("ลบผู้ใช้นี้?")) return;
        setUsers(prev=>prev.filter(u=>u.id!==id));
        if(editId===id) reset();
      };

      const startEdit = u => {
        setEditId(u.id);
        setForm({username:u.username,password:u.password,name:u.name,role:u.role});
        setErr("");
      };

      const roleColor = r => r==="admin"?"#ff9500":"#00aaff";
      const roleLabel = r => r==="admin"?"👑 Admin":"👤 Staff";

      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.93)",zIndex:300,display:"flex",alignItems:"flex-end"}}>
          <div style={{background:"#111",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:440,margin:"0 auto",maxHeight:"92vh",display:"flex",flexDirection:"column",border:"1px solid #2a2a2a"}}>
            {/* Header */}
            <div style={{padding:"16px 20px 12px",borderBottom:"1px solid #222",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
              <div style={{fontSize:15,fontWeight:700}}>⚙️ จัดการผู้ใช้งาน</div>
              <button onClick={onClose} style={{background:"#222",border:"none",color:"#aaa",fontSize:16,cursor:"pointer",borderRadius:8,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>

            <div style={{flex:1,overflowY:"auto",padding:"16px 20px 24px",display:"flex",flexDirection:"column",gap:14}}>

              {/* User list */}
              <div>
                <div style={{fontSize:11,fontWeight:700,color:"#ff6b00",letterSpacing:1,marginBottom:8}}>รายชื่อผู้ใช้งาน ({users.length})</div>
                {users.map(u=>(
                  <div key={u.id} style={{background:editId===u.id?"#1a0a00":"#161616",border:`1px solid ${editId===u.id?"#ff6b0066":"#2a2a2a"}`,borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:3}}>
                        <span style={{fontSize:13,fontWeight:700}}>{u.name}</span>
                        {u.id===currentUser.id&&<span style={{fontSize:9,background:"rgba(255,107,0,.2)",color:"#ff9500",padding:"1px 6px",borderRadius:4,border:"1px solid #ff6b0044"}}>ฉัน</span>}
                      </div>
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <span style={{fontSize:11,fontFamily:"monospace",color:"#aaa"}}>@{u.username}</span>
                        <span style={{fontSize:10,fontWeight:700,padding:"1px 7px",borderRadius:10,background:`${roleColor(u.role)}18`,color:roleColor(u.role),border:`1px solid ${roleColor(u.role)}44`}}>{roleLabel(u.role)}</span>
                      </div>
                      <div style={{fontSize:10,color:"#444",marginTop:3,display:"flex",alignItems:"center",gap:4}}>
                        🔑 Password: <span style={{fontFamily:"monospace",letterSpacing:2}}>{showPw[u.id]?u.password:"•".repeat(u.password.length)}</span>
                        <button onClick={()=>setShowPw(p=>({...p,[u.id]:!p[u.id]}))} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:11,padding:0}}>{showPw[u.id]?"🙈":"👁️"}</button>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:6,flexShrink:0}}>
                      <button onClick={()=>startEdit(u)} style={{padding:"6px 10px",borderRadius:7,border:"1px solid #333",background:"#222",color:"#aaa",cursor:"pointer",fontSize:12}}>✏️</button>
                      <button onClick={()=>del(u.id)} disabled={u.id===currentUser.id}
                        style={{padding:"6px 10px",borderRadius:7,border:"1px solid #cc2222",background:"#1a0000",color:u.id===currentUser.id?"#444":"#ff6666",cursor:u.id===currentUser.id?"not-allowed":"pointer",fontSize:12}}>🗑️</button>
                    </div>
                  </div>
                ))}
              </div>

              {/* Form */}
              <div style={{background:"#0d0d0d",borderRadius:12,padding:14,border:`1px solid ${editId?"#ff6b0044":"#1a1a1a"}`}}>
                <div style={{fontSize:12,fontWeight:700,color:editId?"#ff9500":"#aaa",marginBottom:12}}>
                  {editId?"✏️ แก้ไขผู้ใช้":"➕ เพิ่มผู้ใช้ใหม่"}
                  {editId&&<button onClick={reset} style={{marginLeft:8,fontSize:10,background:"none",border:"none",color:"#666",cursor:"pointer",textDecoration:"underline"}}>ยกเลิก</button>}
                </div>

                {err&&<div style={{background:"rgba(255,51,51,.12)",border:"1px solid #ff3333",borderRadius:8,padding:"7px 10px",fontSize:12,color:"#ff6666",marginBottom:10}}>⚠️ {err}</div>}

                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  <div>
                    <label style={{fontSize:11,color:"#888",display:"block",marginBottom:3}}>ชื่อที่แสดง *</label>
                    <input value={form.name||""} onChange={e=>{setForm(f=>({...f,name:e.target.value}));setErr("");}} placeholder="เช่น นายสมชาย ใจดี"
                      style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #333",background:"#1a1a1a",color:"#fff",fontSize:13}}/>
                  </div>

                  <div>
                    <label style={{fontSize:11,color:"#888",display:"block",marginBottom:3}}>Username *</label>
                    <input value={form.username||""} onChange={e=>{setForm(f=>({...f,username:e.target.value.toLowerCase().replace(/\s/g,"")}));setErr("");}} placeholder="เช่น somchai (ตัวเล็กเท่านั้น)"
                      style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #333",background:"#1a1a1a",color:"#fff",fontSize:13,fontFamily:"monospace"}}/>
                  </div>

                  <div>
                    <label style={{fontSize:11,color:"#888",display:"block",marginBottom:3}}>Password * <span style={{color:"#444"}}>(อย่างน้อย 4 ตัวอักษร)</span></label>
                    <input value={form.password||""} onChange={e=>{setForm(f=>({...f,password:e.target.value}));setErr("");}} placeholder="กรอก Password"
                      style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #333",background:"#1a1a1a",color:"#fff",fontSize:13}}/>
                  </div>

                  <div>
                    <label style={{fontSize:11,color:"#888",display:"block",marginBottom:3}}>สิทธิ์การใช้งาน</label>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      {[["staff","👤 Staff","ใช้งานทั่วไป","#00aaff"],["admin","👑 Admin","จัดการระบบ","#ff9500"]].map(([v,l,sub,c])=>(
                        <button key={v} onClick={()=>setForm(f=>({...f,role:v}))}
                          style={{padding:"10px 8px",borderRadius:10,border:`2px solid ${form.role===v?c:"#2a2a2a"}`,background:form.role===v?`${c}15`:"#161616",cursor:"pointer",textAlign:"center"}}>
                          <div style={{fontSize:14,fontWeight:700,color:form.role===v?c:"#666"}}>{l}</div>
                          <div style={{fontSize:10,color:"#444",marginTop:2}}>{sub}</div>
                        </button>
                      ))}
                    </div>
                  </div>

                  <button onClick={save}
                    style={{width:"100%",padding:13,borderRadius:10,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#ff6b00,#ff9500)",color:"#fff",fontSize:14,fontWeight:700,boxShadow:"0 4px 15px rgba(255,107,0,.35)"}}>
                    {editId?"✅ บันทึกการแก้ไข":"✅ สร้างผู้ใช้ใหม่"}
                  </button>
                </div>
              </div>

              <div style={{fontSize:10,color:"#333",textAlign:"center",padding:"4px 0"}}>
                เฉพาะ Admin เท่านั้นที่เข้าถึงหน้านี้ได้
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════
       APP
    ══════════════════════════════════════════════════════════════ */
    const TABS=["หน้าหลัก","สต๊อก","ขาย/รับ","ประกัน","รายงาน"];
    const ICONS={"หน้าหลัก":"🏠","สต๊อก":"📦","ขาย/รับ":"🔄","ประกัน":"🛡️","รายงาน":"📊"};

    function App() {
      const [users,setUsers,usersLoaded]          = useFirestore("users",        DEF_USERS);
      const [cu,setCU]                            = useState(()=>{ try{const s=sessionStorage.getItem("benz_sess");return s?JSON.parse(s):null;}catch{return null;} });
      const [tab,setTab]                          = useState("หน้าหลัก");
      const [products,setProducts,prodLoaded]     = useCollection("products",     []);
      const [transactions,setTxs,txLoaded]        = useCollection("transactions", []);
      const [warranties,setWarranties,wLoaded]    = useCollection("warranties",   []);
      const [shopName]                            = useFirestore("shopname",     "BENZ ประดับยนต์");
      const [modal,setModal]                      = useState(null);
      const [form,setForm]                        = useState({});
      const [editP,setEditP]                      = useState(null);
      const [searchQ,setSearchQ]                  = useState("");
      const [wSearchQ,setWSearchQ]                = useState("");
      const [reportDate,setRDate]                 = useState(today());
      const [toast,setToast]                      = useState(null);
      const [lastRcp,setLastRcp]                  = useState(null);
      const [wFilter,setWFilter]                  = useState("all");
      const [scanner,setScanner]                  = useState(null);
      const [scanRes,setScanRes]                  = useState(null);
      const [showImport,setShowImport]            = useState(false);
      const [showUsers,setShowUsers]              = useState(false);
      const [showBackup,setShowBackup]            = useState(false);
      const [showBarcode,setShowBarcode]          = useState(false);

      const [online, setOnline] = useState(navigator.onLine);
      useEffect(()=>{
        const on=()=>setOnline(true), off=()=>setOnline(false);
        window.addEventListener("online",on); window.addEventListener("offline",off);
        return()=>{ window.removeEventListener("online",on); window.removeEventListener("offline",off); };
      },[]);

      const allLoaded = prodLoaded && txLoaded && wLoaded && usersLoaded;

      // Loading screen
      if (!allLoaded) return (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#0d0d0d",gap:16}}>
          <div className="logo-pulse" style={{width:70,height:70,borderRadius:"50%",background:"linear-gradient(135deg,#ff6b00,#ff9500)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:34}}>🚗</div>
          <div style={{fontSize:18,fontWeight:800,color:"#fff"}}>BENZ ประดับยนต์</div>
          <div style={{display:"flex",gap:6,alignItems:"center",color:"#ff9500",fontSize:13}}>
            <span className="spin">🔄</span> กำลังโหลดข้อมูลจาก Cloud...
          </div>
          <div style={{fontSize:11,color:"#333"}}>Firebase Firestore</div>
        </div>
      );

      const login  = u => { setCU(u); try{sessionStorage.setItem("benz_sess",JSON.stringify(u));}catch{} };
      const logout = () => { if(!window.confirm("ต้องการออกจากระบบ?"))return; setCU(null); try{sessionStorage.removeItem("benz_sess");}catch{} setTab("หน้าหลัก"); };
      if(!cu) return <LoginPage users={users} onLogin={login}/>;

      const toast_ = (msg,type="ok") => { setToast({msg,type}); setTimeout(()=>setToast(null),2800); };
      const closeModal = () => { setModal(null); setForm({}); setScanRes(null); };

      /* Barcode */
      const onScan = code => {
        setScanner(null);
        const p=products.find(x=>x.code.toLowerCase()===code.toLowerCase()||String(x.id)===code);
        if(p){
          if(scanner==="in"||scanner==="out"){
            // เปิด modal พร้อมเลือกสินค้าทันที
            setForm(f=>({...f, productId:String(p.id), qty:"1"}));
            setScanRes({ok:true,p});
            setModal(scanner); // เปิด modal ขาย/รับ ทันที
            toast_(`✅ พบ: ${p.name}`);
          } else {
            setSearchQ(p.code);
            toast_(`✅ พบ: ${p.name}`);
          }
        } else {
          setScanRes({ok:false,code});
          toast_(`⚠️ ไม่พบรหัส: ${code}`,"err");
          // ถ้า scan จาก modal ที่เปิดอยู่แล้ว ให้คง modal ไว้
          if(scanner==="in"||scanner==="out") setModal(scanner);
        }
      };

      /* TX */
      const submitTx = type => {
        const p=products.find(x=>x.id===parseInt(form.productId));
        if(!p) return toast_("กรุณาเลือกสินค้า","err");
        const qty=parseInt(form.qty);
        if(!qty||qty<=0) return toast_("กรุณากรอกจำนวน","err");
        if(type==="out"&&p.stock<qty) return toast_("⚠️ สต๊อกไม่เพียงพอ!","err");
        const tx={id:Date.now(),date:form.date||today(),time:nowTs(),type,productId:p.id,productName:p.name,qty,price:p.price,note:form.note||(type==="out"?"ขายลูกค้า":"รับสินค้า"),total:p.price*qty,createdBy:cu.name};
        setTxs(prev=>[tx,...prev]);
        setProducts(prev=>prev.map(x=>x.id===p.id?{...x,stock:type==="in"?x.stock+qty:x.stock-qty}:x));
        if(type==="out") setLastRcp(tx);
        closeModal(); toast_(type==="in"?`✅ รับสินค้าเข้า +${qty}`:`✅ บันทึกการขาย -${qty}`);
      };

      /* Add product (auto-code) */
      const openAdd = () => { setForm({code:genNextCode(products)}); setModal("addProduct"); };
      const submitAdd = () => {
        if(!form.name||!form.code||!form.price) return toast_("กรอกข้อมูลให้ครบ","err");
        if(products.find(x=>x.code===form.code)) return toast_("รหัสนี้มีอยู่แล้ว","err");
        setProducts(prev=>[...prev,{id:Date.now(),code:form.code,name:form.name,category:form.category||"ทั่วไป",stock:parseInt(form.stock)||0,price:parseFloat(form.price)||0,unit:form.unit||"ชิ้น",minStock:parseInt(form.minStock)||5}]);
        closeModal(); toast_("✅ เพิ่มสินค้าสำเร็จ");
      };

      /* Edit product */
      const submitEdit = () => { setProducts(prev=>prev.map(x=>x.id===editP.id?{...editP}:x)); setEditP(null); toast_("✅ แก้ไขสำเร็จ"); };
      const delP = id => { if(!window.confirm("ลบสินค้านี้?"))return; setProducts(prev=>prev.filter(x=>x.id!==id)); setEditP(null); toast_("🗑️ ลบแล้ว"); };

      /* Warranty */
      const openW = (w=null) => {
        setForm(w?{editId:w.id,customer:w.customer,phone:w.phone,plate:w.plate,product:w.product,wtype:w.type,saleDate:w.saleDate,months:String(w.months),note:w.note}:{saleDate:today(),months:"12",wtype:"install"});
        setModal("warranty");
      };
      const submitW = () => {
        if(!form.customer||!form.product||!form.saleDate||!form.months) return toast_("กรอกข้อมูลให้ครบ","err");
        const d={customer:form.customer,phone:form.phone||"",plate:form.plate||"",product:form.product,type:form.wtype||"install",saleDate:form.saleDate,months:parseInt(form.months)||12,note:form.note||""};
        if(form.editId){ setWarranties(prev=>prev.map(w=>w.id===form.editId?{...w,...d}:w)); toast_("✅ แก้ไขประกันสำเร็จ"); }
        else{ setWarranties(prev=>[{id:Date.now(),...d},...prev]); toast_("✅ เพิ่มประกันสำเร็จ"); }
        closeModal();
      };
      const delW = id => { if(!window.confirm("ลบรายการประกันนี้?"))return; setWarranties(prev=>prev.filter(w=>w.id!==id)); setModal(null);setForm({}); toast_("🗑️ ลบแล้ว"); };

      /* Import handlers */
      const importProducts = rows => {
        setProducts(prev=>{
          let arr=[...prev];
          rows.forEach(r=>{ const i=arr.findIndex(x=>x.code===r._code); if(i>=0)arr[i]={...arr[i],name:r._name,category:r._cat,price:r._price,stock:r._stock,unit:r._unit,minStock:r._min}; else arr.push({id:Date.now()+Math.random(),code:r._code,name:r._name,category:r._cat,price:r._price,stock:r._stock,unit:r._unit,minStock:r._min}); });
          return arr;
        });
        toast_(`✅ Import สำเร็จ ${rows.length} รายการ`);
      };
      const importWarranties = rows => {
        setWarranties(prev=>[...prev,...rows.map(r=>({id:Date.now()+Math.random(),customer:r._cust,phone:r._phone,plate:r._plate,product:r._prod,type:r._type,saleDate:r._date,months:r._months,note:r._note}))]);
        toast_(`✅ Import ประกัน ${rows.length} รายการ`);
      };

      /* Computed */
      const lowStock  = products.filter(p=>p.stock<p.minStock);
      const warnW     = warranties.filter(w=>wStatus(w)==="warn");
      const expW      = warranties.filter(w=>wStatus(w)==="exp");
      const tSales    = transactions.filter(t=>t.date===reportDate&&t.type==="out");
      const tIn       = transactions.filter(t=>t.date===reportDate&&t.type==="in");
      const tRev      = tSales.reduce((s,t)=>s+t.total,0);
      const filtProd  = products.filter(p=>p.name.toLowerCase().includes(searchQ.toLowerCase())||p.code.toLowerCase().includes(searchQ.toLowerCase())||p.category.toLowerCase().includes(searchQ.toLowerCase()));
      const filtW     = warranties.filter(w=>wFilter==="all"||wStatus(w)===wFilter).filter(w=>!wSearchQ||w.customer.includes(wSearchQ)||w.plate?.includes(wSearchQ)||w.product.includes(wSearchQ)||w.phone?.includes(wSearchQ));

      return (
        <div style={{fontFamily:"'Sarabun',sans-serif",background:"#0d0d0d",minHeight:"100vh",maxWidth:440,margin:"0 auto",position:"relative",paddingBottom:80,color:"#f0f0f0"}}>
          {scanner&&<BarcodeScanner title={scanner==="in"?"สแกนรับเข้า":scanner==="out"?"สแกนขายออก":"สแกนค้นหา"} onScan={onScan} onClose={()=>setScanner(null)}/>}
          {showImport&&<ImportModal onClose={()=>setShowImport(false)} onImportProducts={importProducts} onImportWarranties={importWarranties} products={products}/>}
          {showUsers&&<UserManagement users={users} setUsers={setUsers} currentUser={cu} onClose={()=>setShowUsers(false)}/>}
          {showBackup&&<BackupModal onClose={()=>setShowBackup(false)} onBackup={()=>doBackup({products,transactions,warranties,users})} setProducts={setProducts} setTxs={setTxs} setWarranties={setWarranties} setUsers={setUsers} toast_={toast_}/>}
          {showBarcode&&<BarcodeModal products={products} shopName={shopName} onClose={()=>setShowBarcode(false)}/>}

          {/* HEADER */}
          <div style={{background:"linear-gradient(135deg,#1a0a00,#3d1a00,#1a0a00)",padding:"18px 16px 12px",borderBottom:"2px solid #ff6b00",position:"sticky",top:0,zIndex:100,boxShadow:"0 4px 20px rgba(255,107,0,.3)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div><div style={{fontSize:9,color:"#ff6b00",letterSpacing:3,fontWeight:700,textTransform:"uppercase"}}>ระบบจัดการร้าน</div><div style={{fontSize:20,fontWeight:800,lineHeight:1.2}}>{shopName}</div><div style={{display:"flex",alignItems:"center",gap:4,marginTop:2}}><div style={{width:6,height:6,borderRadius:"50%",background:online?"#00cc66":"#ff3333"}}></div><div style={{fontSize:9,color:online?"#00cc66":"#ff6666"}}>{online?"☁️ Firebase Sync":"⚠️ ออฟไลน์"}</div></div></div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#ff9500",fontWeight:600}}>{cu.name}</div><div style={{fontSize:9,color:"#555"}}>{cu.role==="admin"?"👑 Admin":"👤 Staff"}</div></div>
                {cu.role==="admin"&&<button onClick={()=>setShowUsers(true)} title="จัดการผู้ใช้" style={{width:38,height:38,borderRadius:"50%",background:"rgba(255,107,0,.15)",border:"1px solid #ff6b0044",color:"#ff9500",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>⚙️</button>}
                <button onClick={logout} title="ออกจากระบบ" style={{width:38,height:38,borderRadius:"50%",background:"rgba(255,107,0,.15)",border:"1px solid #ff6b0044",color:"#ff9500",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>🚪</button>
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4,marginTop:lowStock.length||expW.length||warnW.length?8:0}}>
              {lowStock.length>0&&<div style={{background:"rgba(255,50,50,.12)",border:"1px solid #ff3333",borderRadius:8,padding:"4px 10px",fontSize:11,color:"#ff6666",display:"flex",gap:5,alignItems:"center"}}><span>📦</span><span>สต๊อกใกล้หมด <strong>{lowStock.length} รายการ</strong></span></div>}
              {expW.length>0&&<div onClick={()=>setTab("ประกัน")} style={{background:"rgba(255,50,50,.12)",border:"1px solid #ff4444",borderRadius:8,padding:"4px 10px",fontSize:11,color:"#ff8888",cursor:"pointer",display:"flex",gap:5,alignItems:"center"}}><span>🛡️</span><span>ประกันหมดแล้ว <strong>{expW.length} รายการ</strong></span></div>}
              {warnW.length>0&&<div onClick={()=>setTab("ประกัน")} style={{background:"rgba(255,200,0,.08)",border:"1px solid #ffcc0055",borderRadius:8,padding:"4px 10px",fontSize:11,color:"#ffcc00",cursor:"pointer",display:"flex",gap:5,alignItems:"center"}}><span>⚠️</span><span>ประกันใกล้หมด <strong>{warnW.length} รายการ</strong></span></div>}
            </div>
          </div>

          {toast&&<div style={{position:"fixed",top:110,left:"50%",transform:"translateX(-50%)",background:toast.type==="err"?"#cc2222":"#1a7a40",color:"#fff",padding:"9px 18px",borderRadius:10,zIndex:999,fontSize:13,fontWeight:600,boxShadow:"0 4px 20px rgba(0,0,0,.5)",whiteSpace:"nowrap"}}>{toast.msg}</div>}
          {lastRcp&&tab==="หน้าหลัก"&&<div style={{margin:"10px 16px 0",background:"#1a1a00",border:"1px solid #ff9500",borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:12,color:"#aaa"}}>🧾 <strong style={{color:"#fff"}}>{lastRcp.productName}</strong></div><button onClick={()=>printReceipt(lastRcp,shopName)} style={{background:"#ff6b00",border:"none",color:"#fff",padding:"6px 12px",borderRadius:8,fontSize:11,fontWeight:700,cursor:"pointer"}}>🖨️ ใบเสร็จ</button></div>}

          <div style={{padding:"0 16px"}}>
            {tab==="หน้าหลัก"&&<HomeTab products={products} tRev={tRev} tSales={tSales} lowStock={lowStock} warnW={warnW} expW={expW} setTab={setTab} setModal={setModal} transactions={transactions} openW={openW} setScanner={setScanner}/>}
            {tab==="สต๊อก"   &&<StockTab products={filtProd} searchQ={searchQ} setSearchQ={setSearchQ} setEditP={setEditP} lowStock={lowStock} openAdd={openAdd} openScanner={()=>setScanner("stock")} setShowImport={setShowImport} doExport={()=>exportProductsOnly(products)} setShowBarcode={setShowBarcode}/>}
            {tab==="ขาย/รับ" &&<TxTab transactions={transactions} setModal={setModal} printRcp={tx=>printReceipt(tx,shopName)} setScanner={setScanner}/>}
            {tab==="ประกัน"  &&<WarrantyTab warranties={filtW} wFilter={wFilter} setWFilter={setWFilter} wSearchQ={wSearchQ} setWSearchQ={setWSearchQ} openW={openW} delW={delW} printW={w=>printWarrantyDoc(w,shopName)} allW={warranties}/>}
            {tab==="รายงาน"  &&<ReportTab reportDate={reportDate} setRDate={setRDate} tSales={tSales} tIn={tIn} tRev={tRev} transactions={transactions} products={products} warranties={warranties} users={users} doExport={()=>exportAll(products,transactions,warranties)} setShowImport={setShowImport} setShowBackup={setShowBackup}/>}
          </div>

          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:440,background:"#111",borderTop:"1px solid #222",display:"flex",padding:"8px 0 env(safe-area-inset-bottom,12px)",boxShadow:"0 -4px 20px rgba(0,0,0,.5)"}}>
            {TABS.map(t=>(
              <button key={t} onClick={()=>setTab(t)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1,padding:"4px 0",position:"relative"}}>
                <span style={{fontSize:19}}>{ICONS[t]}</span>
                <span style={{fontSize:9,fontWeight:600,color:tab===t?"#ff6b00":"#555"}}>{t}</span>
                {tab===t&&<div style={{width:4,height:4,borderRadius:"50%",background:"#ff6b00",marginTop:1}}/>}
                {t==="ประกัน"&&(expW.length+warnW.length>0)&&<div style={{position:"absolute",top:2,right:"18%",width:8,height:8,borderRadius:"50%",background:expW.length?"#ff3333":"#ffcc00"}}/>}
                {t==="สต๊อก"&&lowStock.length>0&&<div style={{position:"absolute",top:2,right:"18%",width:8,height:8,borderRadius:"50%",background:"#ff3333"}}/>}
              </button>
            ))}
          </div>

          {/* MODALS */}
          {(modal==="in"||modal==="out")&&(
            <Modal title={modal==="in"?"📥 รับสินค้าเข้า":"📤 บันทึกการขาย"} onClose={closeModal}>
              <button onClick={()=>setScanner(modal)} style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"2px dashed #ff6b0066",background:"rgba(255,107,0,.06)",color:"#ff9500",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                <span style={{fontSize:20}}>📷</span> สแกนบาร์โค้ดสินค้า
              </button>
              {scanRes&&<div style={{padding:"8px 12px",borderRadius:8,fontSize:12,background:scanRes.ok?"rgba(0,204,102,.1)":"rgba(255,51,51,.1)",border:`1px solid ${scanRes.ok?"#00cc6644":"#ff333344"}`,color:scanRes.ok?"#00cc66":"#ff6666"}}>
                {scanRes.ok?`✅ พบ: ${scanRes.p.name} (${scanRes.p.code})`:`❌ ไม่พบรหัส: ${scanRes.code}`}
              </div>}
              <div style={{borderTop:"1px solid #222",paddingTop:8}}>
                <div style={{fontSize:11,color:"#666",marginBottom:8}}>หรือเลือกจากรายการ</div>
                <Sel label="สินค้า" value={form.productId||""} onChange={v=>setForm(f=>({...f,productId:v}))}>
                  <option value="">-- เลือกสินค้า --</option>
                  {products.map(p=><option key={p.id} value={p.id}>{p.code} | {p.name} (คงเหลือ {p.stock} {p.unit})</option>)}
                </Sel>

    function WarrantyTab({warranties,wFilter,setWFilter,wSearchQ,setWSearchQ,openW,delW,printW,allW}) {
      const [detail,setDetail]=useState(null);
      const filters=[["all","ทั้งหมด"],["ok","ปกติ"],["warn","ใกล้หมด"],["exp","หมดแล้ว"]];
      const counts={all:allW.length,ok:allW.filter(w=>wStatus(w)==="ok").length,warn:allW.filter(w=>wStatus(w)==="warn").length,exp:allW.filter(w=>wStatus(w)==="exp").length};

        if(!w){setDetail(null);return null;}
        const s=wStatus(w),exp=addMonths(w.saleDate,w.months),dl=daysLeft(exp),p=wPct(w),sc=s==="ok"?"#00cc66":s==="warn"?"#ffcc00":"#ff3333";

          <div style={{paddingTop:14}}>

              </div>
              {w.phone&&<div style={{fontSize:12,color:"#666",marginBottom:8}}>📞 {w.phone}</div>}

                  <div><div style={{color:"#555"}}>ระยะประกัน</div><div style={{fontWeight:600,color:"#aaa"}}>{w.months} เดือน</div></div>

          </div>
        );
      }
      return (
        <div style={{paddingTop:14}}>
          <input value={wSearchQ} onChange={e=>setWSearchQ(e.target.value)} placeholder="🔍 ค้นหา ชื่อ / ทะเบียน / สินค้า"
            style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid #333",background:"#1a1a1a",color:"#fff",fontSize:13,marginBottom:10}}/>
          <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:2}}>
            {filters.map(([v,l])=>(
              <button key={v} onClick={()=>setWFilter(v)} style={{flexShrink:0,padding:"6px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:wFilter===v?"#ff6b00":"#1a1a1a",color:wFilter===v?"#fff":"#666"}}>{l} ({counts[v]})</button>
            ))}
          </div>
          <button onClick={()=>openW()} style={{width:"100%",padding:12,borderRadius:10,border:"1px solid #ff6b0044",background:"rgba(255,107,0,.08)",color:"#ff9500",fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:12}}>🛡️ + เพิ่มรายการประกันใหม่</button>
          {warranties.map(w=>{
            const s=wStatus(w),exp=addMonths(w.saleDate,w.months),dl=daysLeft(exp),p=wPct(w),sc=s==="ok"?"#00cc66":s==="warn"?"#ffcc00":"#ff3333";
            return (
              <div key={w.id} onClick={()=>setDetail(w.id)} style={{background:"#161616",border:`1px solid ${s==="exp"?"#ff333344":s==="warn"?"#ffcc0033":"#2a2a2a"}`,borderRadius:12,padding:14,marginBottom:10,cursor:"pointer",position:"relative",overflow:"hidden"}}>
                <div style={{position:"absolute",top:0,left:0,width:4,height:"100%",background:sc,borderRadius:"4px 0 0 4px"}}/>
                <div style={{paddingLeft:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                    <div><div style={{fontSize:14,fontWeight:700}}>{w.customer}</div><div style={{fontSize:12,fontFamily:"monospace",color:"#00aaff",marginTop:2}}>{w.plate||"ไม่ระบุทะเบียน"}</div></div>
                    <WBadge s={s}/>
                  </div>
                  <div style={{fontSize:12,color:"#888",marginBottom:6}}>{w.type==="install"?"🔧":"📦"} {w.product}</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,fontSize:11,marginBottom:8}}>
                    <div style={{color:"#555"}}>ขาย: <span style={{color:"#aaa"}}>{thDate(w.saleDate)}</span></div>
                    <div style={{color:"#555"}}>หมด: <span style={{color:sc,fontWeight:600}}>{thDate(exp)}</span></div>
                    {w.phone&&<div style={{color:"#555"}}>📞 <span style={{color:"#888"}}>{w.phone}</span></div>}
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#555",marginBottom:3}}>
                    <span>ใช้ไป {p}%</span><span style={{color:sc,fontWeight:600}}>{dl>=0?`เหลือ ${dl} วัน`:`หมด ${Math.abs(dl)} วันแล้ว`}</span>
                  </div>
                  <div className="prog-bar"><div className="prog-fill" style={{width:`${p}%`,background:sc}}/></div>
                </div>
              </div>
            );
          })}
          {warranties.length===0&&<Empty msg="ไม่มีรายการประกัน"/>}
        </div>
      );
    }

    function ReportTab({reportDate,setRDate,tSales,tIn,tRev,transactions,products,warranties,users,doExport,setShowImport,setShowBackup}) {
      const last7=Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(6-i)); const ds=d.toISOString().slice(0,10); return{ds,rev:transactions.filter(t=>t.date===ds&&t.type==="out").reduce((s,t)=>s+t.total,0),label:d.toLocaleDateString("th-TH",{day:"numeric",month:"short"})}; });
      const maxRev=Math.max(...last7.map(d=>d.rev),1);
      const expW=warranties.filter(w=>wStatus(w)==="exp"), warnW=warranties.filter(w=>wStatus(w)==="warn");

      // Firestore info
      const storageInfo = (() => {
        try {
          const toBytes = obj => new Blob([JSON.stringify(obj)]).size;
          const pBytes  = toBytes(products);
          const tBytes  = toBytes(transactions);
          const wBytes  = toBytes(warranties);
          const uBytes  = toBytes(users||[]);
          const used    = pBytes + tBytes + wBytes + uBytes;
          const fmtB    = b => b>1024*1024?`${(b/1024/1024).toFixed(2)} MB`:b>1024?`${(b/1024).toFixed(1)} KB`:`${b} B`;
          return { used, fmtB,
            counts: {
              products: products.length,
              transactions: transactions.length,
              warranties: warranties.length,
            },
            breakdown:[
              {label:"📦 สินค้า",       bytes:pBytes, count:products.length},
              {label:"🔄 ประวัติขาย/รับ",bytes:tBytes, count:transactions.length},
              {label:"🛡️ ประกัน",       bytes:wBytes, count:warranties.length},
              {label:"👤 ผู้ใช้",        bytes:uBytes, count:(users||[]).length},
            ]
          };
        } catch { return null; }
      })();
      return (
        <div style={{paddingTop:14}}>
          <input type="date" value={reportDate} onChange={e=>setRDate(e.target.value)}
            style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid #333",background:"#1a1a1a",color:"#fff",fontSize:13,marginBottom:12}}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
            <Stat icon="💰" label="รายได้"    val={`฿${fmt(tRev)}`}     color="#ff6b00" sm/>
            <Stat icon="🛒" label="ขาย"       val={`${tSales.length}`}   color="#00aaff" sm/>
            <Stat icon="📥" label="รับสินค้า" val={`${tIn.length}`}      color="#00cc66" sm/>
          </div>
          <SecTitle>ยอดขาย 7 วันย้อนหลัง</SecTitle>
          <div style={{background:"#111",borderRadius:12,padding:14,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"flex-end",gap:5,height:70}}>
              {last7.map(d=>(
                <div key={d.ds} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  <div style={{width:"100%",borderRadius:"4px 4px 0 0",background:d.ds===reportDate?"#ff6b00":"#2a2a2a",height:`${d.rev>0?Math.max((d.rev/maxRev)*55,4):3}px`,transition:"height .3s"}}/>
                  <div style={{fontSize:8,color:"#555",textAlign:"center",lineHeight:1.2}}>{d.label}</div>
                </div>
              ))}
            </div>
          </div>
          <SecTitle>สรุปประกัน</SecTitle>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
            <Stat icon="🛡️" label="ทั้งหมด" val={`${warranties.length}`} color="#00aaff" sm/>
            <Stat icon="⚠️" label="ใกล้หมด" val={`${warnW.length}`}      color="#ffcc00" sm/>
            <Stat icon="❌" label="หมดแล้ว" val={`${expW.length}`}        color="#ff3333" sm/>
          </div>
          <SecTitle>รายการขาย — {thDate(reportDate)}</SecTitle>
          {tSales.map(t=><TxRow key={t.id} tx={t}/>)}
          {tSales.length===0&&<Empty msg="ไม่มีรายการขายในวันที่เลือก"/>}
          <div style={{marginTop:18,display:"flex",flexDirection:"column",gap:8}}>
            <SecTitle>จัดการข้อมูล</SecTitle>

            {/* Storage indicator */}
            {storageInfo&&<div style={{background:"#0d0d0d",borderRadius:12,padding:14,border:"1px solid #ff6b0022",marginBottom:4}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:700}}>☁️ ข้อมูลบน Firebase</div>
                <div style={{fontSize:11,color:"#00cc66",fontWeight:700}}>ไม่จำกัด ✅</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {storageInfo.breakdown.map(item=>(
                  <div key={item.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",background:"#161616",borderRadius:8}}>
                    <span style={{fontSize:12,color:"#888"}}>{item.label}</span>
                    <div style={{textAlign:"right"}}>
                      <span style={{fontSize:13,fontWeight:700,color:"#ff9500"}}>{item.count} รายการ</span>
                      <span style={{fontSize:10,color:"#444",marginLeft:6}}>{storageInfo.fmtB(item.bytes)}</span>
                    </div>
                  </div>
                ))}
                <div style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",borderTop:"1px solid #222",marginTop:2}}>
                  <span style={{fontSize:11,color:"#555"}}>รวมทั้งหมด</span>
                  <span style={{fontSize:12,fontWeight:700,color:"#aaa"}}>{storageInfo.fmtB(storageInfo.used)}</span>
                </div>
              </div>
            </div>}
            <button onClick={doExport} style={{width:"100%",padding:14,borderRadius:10,border:"1px solid #00cc6644",background:"rgba(0,204,102,.08)",color:"#00cc66",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              📊 Export Excel รวมทุกชีต (+ Template สำหรับ Import)
            </button>
            <button onClick={()=>setShowImport(true)} style={{width:"100%",padding:14,borderRadius:10,border:"1px solid #00aaff44",background:"rgba(0,170,255,.08)",color:"#00aaff",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              📂 Import ข้อมูลจาก Excel
            </button>
            <div style={{height:1,background:"#1a1a1a",margin:"4px 0"}}/>
            <button onClick={()=>setShowBackup(true)} style={{width:"100%",padding:14,borderRadius:10,border:"1px solid #ffcc0044",background:"rgba(255,204,0,.06)",color:"#ffcc00",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              💾 Backup / Restore ข้อมูลทั้งหมด
            </button>
          </div>
        </div>
      );
    }

    /* ─── SHARED UI ───────────────────────────────────────────── */
    function WBadge({s}) {
      const m={ok:{bg:"rgba(0,204,102,.12)",c:"#00cc66",b:"rgba(0,204,102,.3)",t:"✅ ปกติ"},warn:{bg:"rgba(255,204,0,.1)",c:"#ffcc00",b:"rgba(255,204,0,.3)",t:"⚠️ ใกล้หมด"},exp:{bg:"rgba(255,51,51,.12)",c:"#ff3333",b:"rgba(255,51,51,.3)",t:"❌ หมดแล้ว"}}[s]||{bg:"rgba(0,204,102,.12)",c:"#00cc66",b:"rgba(0,204,102,.3)",t:"✅ ปกติ"};
      return <span style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:20,background:m.bg,color:m.c,border:`1px solid ${m.b}`,whiteSpace:"nowrap"}}>{m.t}</span>;
    }
    function Modal({title,children,onClose}) {
      return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"flex-end"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
        <div style={{background:"#111",borderRadius:"20px 20px 0 0",padding:20,width:"100%",maxWidth:440,margin:"0 auto",maxHeight:"88vh",overflowY:"auto",border:"1px solid #2a2a2a"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontSize:15,fontWeight:700}}>{title}</div>
            <button onClick={onClose} style={{background:"#222",border:"none",color:"#aaa",fontSize:16,cursor:"pointer",borderRadius:8,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>{children}</div>
        </div>
      </div>;
    }
    function Inp({label,value,onChange,type="text",placeholder=""}) {
      return <div><label style={{fontSize:11,color:"#888",display:"block",marginBottom:3}}>{label}</label><input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #333",background:"#1a1a1a",color:"#fff",fontSize:13}}/></div>;
    }
    function Sel({label,value,onChange,children}) {
      return <div><label style={{fontSize:11,color:"#888",display:"block",marginBottom:3}}>{label}</label><select value={value} onChange={e=>onChange(e.target.value)} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #333",background:"#1a1a1a",color:"#fff",fontSize:12}}>{children}</select></div>;
    }
    function OBtn({onClick,children}) {
      return <button onClick={onClick} style={{width:"100%",padding:14,borderRadius:10,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#ff6b00,#ff9500)",color:"#fff",fontSize:14,fontWeight:700,boxShadow:"0 4px 15px rgba(255,107,0,.35)"}}>{children}</button>;
    }
    function Stat({icon,label,val,color,sm}) {
      return <div style={{background:"#161616",border:`1px solid ${color}33`,borderRadius:12,padding:sm?"10px":"13px",borderLeft:`3px solid ${color}`}}>
        <div style={{fontSize:sm?15:20,marginBottom:3}}>{icon}</div>
        <div style={{fontSize:sm?13:17,fontWeight:800,color}}>{val}</div>
        <div style={{fontSize:sm?9:10,color:"#555"}}>{label}</div>
      </div>;
    }
    function ABtn({icon,label,color,onClick}) {
      return <button onClick={onClick} style={{flex:1,padding:"13px 8px",borderRadius:12,border:`1px solid ${color}33`,background:`${color}11`,color:"#fff",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
        <span style={{fontSize:22}}>{icon}</span><span style={{fontSize:11,fontWeight:600,color}}>{label}</span>
      </button>;
    }
    function TxRow({tx,onPrint}) {
      const isOut=tx.type==="out";
      return <div style={{background:"#161616",borderRadius:10,padding:"10px 12px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",border:`1px solid ${isOut?"#ff6b0018":"#00cc6618"}`}}>
        <div style={{display:"flex",gap:9,alignItems:"center",flex:1}}>
          <div style={{width:34,height:34,borderRadius:9,background:isOut?"#ff6b0018":"#00cc6618",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{isOut?"📤":"📥"}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{tx.productName}</div>
            <div style={{fontSize:10,color:"#555"}}>{thDate(tx.date)}{tx.time?` ${tx.time}`:""} · {tx.note}</div>
            {tx.createdBy&&<div style={{fontSize:9,color:"#444"}}>👤 {tx.createdBy}</div>}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0,paddingLeft:8}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:14,fontWeight:700,color:isOut?"#ff9500":"#00cc66"}}>{isOut?"-":"+"}{tx.qty}</div>
            <div style={{fontSize:10,color:"#555"}}>฿{fmt(tx.total)}</div>
          </div>
          {onPrint&&<button onClick={e=>{e.stopPropagation();onPrint();}} style={{background:"#1a1a1a",border:"1px solid #333",color:"#aaa",padding:"4px 7px",borderRadius:6,fontSize:11,cursor:"pointer"}}>🖨️</button>}
        </div>
      </div>;
    }
    function SecTitle({children}) {
      return <div style={{fontSize:11,fontWeight:700,color:"#ff6b00",marginBottom:8,marginTop:4,letterSpacing:1,textTransform:"uppercase"}}>{children}</div>;
    }
    function Empty({msg}) {
      return <div style={{color:"#333",fontSize:13,textAlign:"center",padding:"24px 0"}}>{msg}</div>;
    }

    ReactDOM.createRoot(document.getElementById("app-root")).render(<App/>);
  </script>
</body>
</html>
