// ==================== LOCAL STORAGE HOOK ====================
function useLocalStorage(key, defaultValue) {
  const [value, setValue] = React.useState(() => {
    try {
      const item = localStorage.getItem(key);
      return item ? JSON.parse(item) : defaultValue;
    } catch { return defaultValue; }
  });
  const setStoredValue = (newValue) => {
    setValue(prev => {
      const val = typeof newValue === 'function' ? newValue(prev) : newValue;
      try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
      return val;
    });
  };
  return [value, setStoredValue];
}

// ==================== HELPERS ====================
function genBillId(sales) {
  const now = new Date();
  const yy = String(now.getFullYear()).slice(2);
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const prefix = `BNZ-${yy}${mm}-`;
  const existingNums = sales
    .filter(s => s.id.startsWith(prefix))
    .map(s => parseInt(s.id.replace(prefix,'')) || 0);
  const next = existingNums.length > 0 ? Math.max(...existingNums) + 1 : 1;
  return prefix + String(next).padStart(3,'0');
}

function genInvId(sales) {
  const now = new Date();
  const yy = String(now.getFullYear()).slice(2);
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const prefix = `INV-${yy}${mm}-`;
  const existingNums = sales
    .filter(s => s.id.startsWith(prefix))
    .map(s => parseInt(s.id.replace(prefix,'')) || 0);
  const next = existingNums.length > 0 ? Math.max(...existingNums) + 1 : 1;
  return prefix + String(next).padStart(3,'0');
}

function numToWords(num) {
  // Thai baht words - simplified
  if (num === 0) return 'ศูนย์บาทถ้วน';
  const ones = ['','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า'];
  const tens = ['','สิบ','ยี่สิบ','สามสิบ','สี่สิบ','ห้าสิบ','หกสิบ','เจ็ดสิบ','แปดสิบ','เก้าสิบ'];
  const positions = ['','สิบ','ร้อย','พัน','หมื่น','แสน','ล้าน'];
  const n = Math.round(num);
  const satang = Math.round((num - n) * 100);
  let result = '';
  const s = String(n);
  for (let i = 0; i < s.length; i++) {
    const d = parseInt(s[i]);
    const pos = s.length - 1 - i;
    if (d === 0) continue;
    if (pos === 1 && d === 2) result += 'ยี่สิบ';
    else if (pos === 1 && d === 1) result += 'สิบ';
    else result += ones[d] + (pos > 0 ? positions[pos] : '');
  }
  return result + 'บาท' + (satang > 0 ? `${satang}สตางค์` : 'ถ้วน');
}

  const [username, setUsername] = useState('');

  const login = () => {

    if (user) { onLogin(user); setError(''); }
    else setError('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');

            );
          })}
        </div>
      </div>
    </div>
  );
}


// ==================== CAMERA SCANNER COMPONENT ====================
function CameraScanner({ onDetected, onClose }) {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const detectorRef = useRef(null);
  const rafRef = useRef(null);
  const lastRef = useRef('');
  const [status, setStatus] = useState('starting'); // starting | scanning | unsupported | error
  const [errMsg, setErrMsg] = useState('');
  const [manualVal, setManualVal] = useState('');

  useEffect(() => {
    const supported = 'BarcodeDetector' in window;
    if (!supported) { setStatus('unsupported'); return; }

    detectorRef.current = new window.BarcodeDetector({
      formats: ['ean_13','ean_8','code_128','code_39','code_93','qr_code','upc_a','upc_e','itf']
    });

    navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } } })
      .then(stream => {
        streamRef.current = stream;
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          videoRef.current.onloadedmetadata = () => {
            videoRef.current.play();
            setStatus('scanning');
            scan();
          };
        }
      })
      .catch(err => { setStatus('error'); setErrMsg(err.message || 'ไม่สามารถเข้าถึงกล้องได้'); });

    const scan = async () => {
      if (!videoRef.current || !detectorRef.current) return;
      try {
        const results = await detectorRef.current.detect(videoRef.current);
        if (results.length > 0) {
          const val = results[0].rawValue;
          if (val !== lastRef.current) {
            lastRef.current = val;
            onDetected(val);
          }
        }
      } catch {}
      rafRef.current = requestAnimationFrame(scan);
    };

    return () => {
      if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
    };
  }, []);

  const submitManual = () => {
    if (manualVal.trim()) { onDetected(manualVal.trim()); setManualVal(''); }
  };

  return (
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:420,padding:0,overflow:'hidden'}}>
        <div className="modal-head" style={{padding:'12px 16px'}}>
          <span style={{fontFamily:'Rajdhani',color:'var(--gold)',fontSize:17}}>📷 สแกนบาร์โค้ด</span>
          <button className="close-btn" onClick={onClose}>✕</button>
        </div>

        {/* Video area */}
        <div style={{position:'relative',background:'#000',width:'100%',aspectRatio:'4/3',overflow:'hidden'}}>
          <video ref={videoRef} style={{width:'100%',height:'100%',objectFit:'cover'}} playsInline muted autoPlay/>
          {/* Scan guide box */}
          {status==='scanning' && (
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
              <div style={{width:'65%',height:'30%',border:'2px solid rgba(200,168,75,0.85)',borderRadius:8,boxShadow:'0 0 0 3000px rgba(0,0,0,0.35)'}}>
                <div style={{position:'absolute',top:0,left:0,right:0,textAlign:'center',paddingTop:'8px',color:'rgba(200,168,75,0.9)',fontSize:12,fontFamily:'Sarabun'}}>วางบาร์โค้ดในกรอบ</div>
              </div>
            </div>
          )}
          {status==='starting' && (
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13}}>
              กำลังเปิดกล้อง...
            </div>
          )}
          {(status==='unsupported'||status==='error') && (
            <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'#fff',padding:24,textAlign:'center'}}>
              <div style={{fontSize:40,marginBottom:12}}>{status==='error'?'🚫':'📵'}</div>
              <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>
                {status==='error'?'ไม่สามารถเข้าถึงกล้องได้':'เบราว์เซอร์ไม่รองรับ BarcodeDetector'}
              </div>
              <div style={{fontSize:11,color:'#ccc',marginBottom:8}}>{errMsg}</div>
              {status==='unsupported' && <div style={{fontSize:11,color:'#aaa'}}>แนะนำ: Chrome บน Android / Chrome Desktop<br/>พิมพ์รหัสด้านล่างแทนได้</div>}
            </div>
          )}
        </div>

        {/* Manual fallback */}
        <div style={{padding:'12px 16px 16px'}}>
          {status==='scanning' && <div style={{fontSize:11,color:'var(--green)',textAlign:'center',marginBottom:8}}>🟢 กำลังสแกน... (ตรวจจับอัตโนมัติ)</div>}
          <div style={{display:'flex',gap:8}}>
            <input className="input" placeholder="หรือพิมพ์บาร์โค้ด / รหัสสินค้าด้วยตัวเอง"
              value={manualVal} onChange={e=>setManualVal(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&submitManual()}
              style={{flex:1,fontSize:13}}/>
            <button className="btn btn-gold" onClick={submitManual}>ยืนยัน</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ==================== POS ====================
function POS({ products, setProducts, sales, setSales, user, shop }) {
  const [cart, setCart] = useState([]);
  const [search, setSearch] = useState('');
  const [scanInput, setScanInput] = useState('');
  const [customer, setCustomer] = useState('');
  const [custTaxId, setCustTaxId] = useState('');
  const [custAddress, setCustAddress] = useState('');
  const [payMethod, setPayMethod] = useState('cash');
  const [billType, setBillType] = useState('receipt');
  const [showReceipt, setShowReceipt] = useState(false);
  const [showInvoice, setShowInvoice] = useState(false);
  const [docData, setDocData] = useState(null);
  const [catFilter, setCatFilter] = useState('ทั้งหมด');
  const [installFee, setInstallFee] = useState(0);
  const [showCamera, setShowCamera] = useState(false);

  const cats = ['ทั้งหมด', ...new Set(products.map(p=>p.cat))];
  const filtered = products.filter(p => {
    const matchSearch = p.name.toLowerCase().includes(search.toLowerCase()) || p.barcode.includes(search) || p.cat.includes(search);
    const matchCat = catFilter === 'ทั้งหมด' || p.cat === catFilter;
    return matchSearch && matchCat;
  });

  const addToCart = (product) => {
    if (product.stock <= 0) return alert('สินค้าหมดสต็อก!');
    setCart(prev => {
      const ex = prev.find(i => i.id === product.id);
      if (ex) return prev.map(i => i.id === product.id ? {...i, qty: i.qty+1} : i);
      return [...prev, {...product, qty: 1}];
    });
  };

  const handleScan = (e) => {
    if (e.key === 'Enter') {
      const p = products.find(pr => pr.barcode === scanInput.trim() || pr.id === scanInput.trim());
      if (p) { addToCart(p); setScanInput(''); }
      else { alert('ไม่พบสินค้า: ' + scanInput); setScanInput(''); }
    }
  };
  const handleCameraScanPOS = (code) => {
    const p = products.find(pr => pr.barcode === code.trim() || pr.id === code.trim());
    if (p) { addToCart(p); }
    else { alert('ไม่พบสินค้า: ' + code); }
  };

  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const taxableBase = total + installFee;
  const vat = Math.round(taxableBase * 0.07);
  const grand = taxableBase + vat;

  const checkout = () => {
    if (cart.length === 0) return;
    const isInv = billType === 'invoice';
    const id = isInv ? genInvId(sales) : genBillId(sales);
    const doc = {
      id,
      date: new Date().toLocaleDateString('th-TH'),
      time: new Date().toLocaleTimeString('th-TH'),
      customer: customer || 'Walk-in',
      custTaxId: custTaxId || '',
      custAddress: custAddress || '',
      items: [...cart],
      installFee, subtotal: total, vat, grand,
      pay: payMethod,
      billType,
      cashier: user.name,
    };
    setProducts(prev => prev.map(p => {
      const c = cart.find(ci => ci.id === p.id);
      return c ? {...p, stock: p.stock - c.qty} : p;
    }));
    setSales(prev => [{
      id: doc.id,
      date: doc.date,
      customer: doc.customer,
      total: grand,
      items: cart.length,
      status: 'completed',
      paid: payMethod,
      billType,
      custTaxId,
      fullDoc: doc,
    }, ...prev]);
    setDocData(doc);
    if (isInv) setShowInvoice(true); else setShowReceipt(true);
    setCart([]); setCustomer(''); setCustTaxId(''); setCustAddress('');
    setInstallFee(0);
  };

  // Camera scanner modal close handler
  const closeCameraPOS = () => setShowCamera(false);

  const handlePrintReceipt = () => {
    const html = document.getElementById('receipt-print-area').innerHTML;
    printDoc(html);
  };
  const handlePrintInvoice = () => {
    const html = document.getElementById('invoice-print-area').innerHTML;
    printDoc(html);
  };

  return (
    <div className="pos-grid">
      {showCamera && <CameraScanner onDetected={(code)=>{ handleCameraScanPOS(code); }} onClose={closeCameraPOS}/>}
      <div style={{display:'flex',flexDirection:'column',gap:10,overflow:'hidden'}}>
        <div style={{display:'flex',gap:8}}>
          <input className="input" placeholder="🔍 ค้นหาสินค้า..." value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1}}/>
          <input className="input" placeholder="📟 สแกน / พิมพ์รหัส + Enter" value={scanInput} onChange={e=>setScanInput(e.target.value)} onKeyDown={handleScan} style={{width:160}}/>
          <button className="btn btn-blue" style={{flexShrink:0,fontSize:13,padding:'0 12px'}} onClick={()=>setShowCamera(true)} title="เปิดกล้องสแกนบาร์โค้ด">📷</button>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {cats.map(c=>(
            <button key={c} className={`btn ${catFilter===c?'btn-gold':''}`} style={{fontSize:11,padding:'5px 10px'}} onClick={()=>setCatFilter(c)}>{c}</button>
          ))}
        </div>
        <div className="product-grid" style={{flex:1}}>
          {filtered.map(p => (
            <div key={p.id} className="product-card" onClick={() => addToCart(p)}>
              <div style={{fontSize:28,marginBottom:5}}>{p.icon}</div>
              <div style={{fontSize:11,lineHeight:1.3,marginBottom:4}}>{p.name}</div>
              <div style={{fontFamily:'Rajdhani',fontSize:14,color:'var(--gold)',fontWeight:600}}>฿{p.price.toLocaleString()}</div>
              <div style={{fontSize:10,color:p.stock<10?'var(--red)':'var(--text3)',marginTop:2}}>คลัง: {p.stock}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:8,overflow:'hidden'}}>
        {/* Bill Type */}
        <div className="card" style={{flexShrink:0,padding:'10px 12px'}}>
          <div className="form-label">ประเภทเอกสาร</div>
          <div style={{display:'flex',gap:6}}>
            <button className={`btn ${billType==='receipt'?'btn-green':''}`} style={{flex:1,fontSize:11}} onClick={()=>setBillType('receipt')}>🧾 ใบเสร็จรับเงิน</button>
            <button className={`btn ${billType==='invoice'?'btn-gold':''}`} style={{flex:1,fontSize:11}} onClick={()=>setBillType('invoice')}>📄 ใบกำกับภาษี</button>
          </div>
        </div>

        {/* Customer Info */}
        <div className="card" style={{flexShrink:0}}>
          <div className="form-label">ข้อมูลลูกค้า</div>
          <input className="input" placeholder="ชื่อลูกค้า / บริษัท" value={customer} onChange={e=>setCustomer(e.target.value)} style={{marginBottom:6}}/>
          {billType === 'invoice' && (
            <>
              <input className="input" placeholder="เลขที่ผู้เสียภาษี (13 หลัก)" value={custTaxId} onChange={e=>setCustTaxId(e.target.value)} style={{marginBottom:6}}/>
              <input className="input" placeholder="ที่อยู่ลูกค้า" value={custAddress} onChange={e=>setCustAddress(e.target.value)}/>
            </>
          )}
        </div>

        {/* Cart */}
        <div className="card" style={{flex:1,overflow:'auto'}}>
          <div className="card-title">ตะกร้าสินค้า ({cart.length} รายการ)</div>
          {cart.length === 0 ? (
            <div className="scanner-box">
              <div style={{fontSize:32,marginBottom:8}}>🛒</div>
              <div style={{color:'var(--text3)',fontSize:13}}>คลิกสินค้าหรือสแกนบาร์โค้ด</div>
            </div>
          ) : cart.map(item => (
            <div key={item.id} className="cart-item">
              <span style={{fontSize:18}}>{item.icon}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.name}</div>
                <div style={{fontSize:12,color:'var(--gold)',fontFamily:'Rajdhani'}}>฿{(item.price*item.qty).toLocaleString()}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:4}}>
                <button className="qty-btn" onClick={()=>setCart(c=>c.map(i=>i.id===item.id?{...i,qty:Math.max(0,i.qty-1)}:i).filter(i=>i.qty>0))}>−</button>
                <span style={{fontSize:13,minWidth:20,textAlign:'center'}}>{item.qty}</span>
                <button className="qty-btn" onClick={()=>setCart(c=>c.map(i=>i.id===item.id?{...i,qty:i.qty+1}:i))}>+</button>
              </div>

        </div>

        {/* Summary & Checkout */}
        <div className="card" style={{flexShrink:0}}>
          {/* Install Fee */}
          <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,padding:'10px 12px',marginBottom:8}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontSize:12,color:'var(--amber)',fontWeight:600}}>🔧 ค่าติดตั้ง</span>
              {installFee > 0 && <span className="badge badge-amber">฿{installFee.toLocaleString()}</span>}
            </div>
            <div style={{display:'flex',gap:4,marginBottom:6}}>
              {[0,500,1000,1500,2000,3000].map(n=>(
                <button key={n} className={`btn ${installFee===n?'btn-gold':''}`}
                  style={{fontSize:10,padding:'4px 6px',flex:1}}
                  onClick={()=>setInstallFee(n)}>
                  {n===0?'ไม่มี':`฿${n.toLocaleString()}`}
                </button>
              ))}
            </div>
            <input type="number" className="input" placeholder="หรือพิมพ์จำนวนเงิน..."
              value={installFee || ''} min={0}
              onChange={e=>setInstallFee(Math.max(0,parseInt(e.target.value)||0))}
              style={{fontSize:12,padding:'6px 10px'}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
            <span style={{color:'var(--text3)'}}>ค่าสินค้า</span>

          </div>
          {installFee > 0 && (
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
              <span style={{color:'var(--amber)'}}>🔧 ค่าติดตั้ง</span>

            <span style={{color:'var(--text3)'}}>VAT 7%</span>
            <span style={{fontFamily:'Rajdhani',color:'var(--text3)'}}>฿{vat.toLocaleString()}</span>

      {/* Tax Invoice Modal */}

// ==================== STOCK ====================
function Stock({ products, setProducts, user, log, setLog }) {
  const [mode, setMode] = useState('in');
  const [scan, setScan] = useState('');
  const [found, setFound] = useState(null);
  const [qty, setQty] = useState(1);
  const [showStockCam, setShowStockCam] = useState(false);

  const doScan = (code) => {
    const val = (code || scan).trim();
    const p = products.find(pr => pr.barcode === val || pr.id === val);
    if (p) setFound(p); else alert('ไม่พบสินค้า: ' + val);
  };
  const confirm = () => {
    if (!found) return;
    setProducts(prev => prev.map(p => p.id !== found.id ? p : {...p, stock: mode==='in' ? p.stock+qty : Math.max(0, p.stock-qty)}));
    setLog(prev => [{id:Date.now(),type:mode,product:found.name,qty,date:new Date().toISOString().slice(0,10),by:user.username},...prev]);
    setFound(null); setScan(''); setQty(1);
  };

  return (
    <div>
      {showStockCam && <CameraScanner onDetected={(code)=>{ doScan(code); setShowStockCam(false); }} onClose={()=>setShowStockCam(false)}/>}
      <div className="grid2" style={{marginBottom:12}}>
        <div className="card">
          <div className="card-title">สแกนเข้า / ออก คลัง</div>
          <div className="tab-bar">
            <div className={`tab ${mode==='in'?'active':''}`} onClick={()=>{setMode('in');setFound(null);}}>📦 รับเข้าคลัง</div>
            <div className={`tab ${mode==='out'?'active':''}`} onClick={()=>{setMode('out');setFound(null);}}>📤 เบิกออก</div>
          </div>
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <input className="input" placeholder="รหัสสินค้า หรือ บาร์โค้ด + Enter" value={scan} onChange={e=>setScan(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doScan()} style={{flex:1}}/>
            <button className="btn btn-gold" style={{flexShrink:0}} onClick={()=>doScan()}>ค้นหา</button>
            <button className="btn btn-blue" style={{flexShrink:0,fontSize:13}} onClick={()=>setShowStockCam(true)} title="เปิดกล้อง">📷</button>
          </div>
          {found ? (
            <div style={{background:'var(--bg3)',border:'1px solid var(--gold-dim)',borderRadius:8,padding:14}}>
              <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:10}}>
                <span style={{fontSize:36}}>{found.icon}</span>
                <div>
                  <div style={{fontFamily:'Rajdhani',fontSize:16,color:'var(--gold)'}}>{found.id}</div>
                  <div style={{fontSize:14}}>{found.name}</div>
                  <div style={{fontSize:12,color:'var(--text3)'}}>สต็อก: <span style={{color:found.stock<10?'var(--red)':'var(--green)'}}>{found.stock} {found.unit}</span></div>
                </div>
              </div>
              <div style={{textAlign:'center',marginBottom:12}}><BarcodeDisplay code={found.barcode}/></div>

// ==================== WARRANTY ====================
function Warranty({ products, warranties, setWarranties }) {
  const [form, setForm] = useState({product:'',customer:'',saleDate:'',months:'12',serial:''});

  const getExpiry = (saleDate, months) => { const d = new Date(saleDate); d.setMonth(d.getMonth()+months); return d; };
  const getPct = (saleDate, months) => {
    const start = new Date(saleDate).getTime(), end = getExpiry(saleDate,months).getTime(), now = Date.now();
    return Math.min(100, Math.max(0, Math.round((now-start)/(end-start)*100)));
  };

  const addWarranty = () => {
    if (!form.product || !form.customer || !form.saleDate) return alert('กรุณากรอกข้อมูลให้ครบ');
    const id = 'W' + String(warranties.length+1).padStart(3,'0');
    const expiry = getExpiry(form.saleDate, +form.months);
    setWarranties(prev => [...prev, {...form, id, months:+form.months, status: expiry > new Date() ? 'active':'expired'}]);
    setForm({product:'',customer:'',saleDate:'',months:'12',serial:''});
  };

  return (
    <div>
      <div className="stat-grid" style={{marginBottom:12}}>
        {[['ประกันทั้งหมด',warranties.length,'var(--text)'],['กำลังใช้งาน',warranties.filter(w=>w.status==='active').length,'var(--green)'],['หมดอายุ',warranties.filter(w=>w.status==='expired').length,'var(--red)'],['ใกล้หมด',1,'var(--amber)']].map(([l,v,c])=>(
          <div key={l} className="stat-card"><div className="stat-lbl">{l}</div><div className="stat-val" style={{color:c}}>{v}</div></div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:10,marginBottom:12}}>
        {warranties.map(w => {
          const pct = getPct(w.saleDate, w.months);
          const exp = getExpiry(w.saleDate, w.months);
          const isExpired = w.status === 'expired';
          const barColor = isExpired?'var(--red)':pct>75?'var(--amber)':'var(--green)';
          return (
            <div key={w.id} className="card">
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
                <div><div style={{fontSize:14,fontWeight:500}}>{w.product}</div><div style={{fontSize:12,color:'var(--text3)'}}>ลูกค้า: {w.customer}</div></div>
                <span className={`badge ${isExpired?'badge-red':'badge-green'}`}>{isExpired?'หมดอายุ':'ใช้งาน'}</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:12,marginBottom:10}}>
                <div><span style={{color:'var(--text3)'}}>วันที่ซื้อ: </span>{w.saleDate}</div>
                <div><span style={{color:'var(--text3)'}}>ประกัน: </span>{w.months} เดือน</div>
                <div><span style={{color:'var(--text3)'}}>หมดอายุ: </span><span style={{color:isExpired?'var(--red)':'var(--text)'}}>{exp.toISOString().slice(0,10)}</span></div>
                <div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}><span style={{color:'var(--text3)'}}>Serial: </span><span style={{fontFamily:'monospace',fontSize:11}}>{w.serial}</span></div>
              </div>
              <div style={{fontSize:11,color:'var(--text3)',marginBottom:4}}>ใช้ประกันไปแล้ว {pct}%</div>
              <div className="warranty-bar"><div className="warranty-fill" style={{width:`${pct}%`,background:barColor}}/></div>
            </div>
          );
        })}
      </div>
      <div className="card">
        <div className="card-title">ลงทะเบียนประกันสินค้าใหม่</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:10,alignItems:'end'}}>
          {[['ชื่อสินค้า','product','text'],['ชื่อลูกค้า','customer','text'],['วันที่ซื้อ','saleDate','date'],['ระยะประกัน (เดือน)','months','number'],['Serial No.','serial','text']].map(([l,k,t])=>(
            <div key={k}>
              <div className="form-label">{l}</div>
              <input className="input" type={t} value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} placeholder={l}/>
            </div>
          ))}
          <div><button className="btn btn-gold" style={{width:'100%',padding:9}} onClick={addWarranty}>+ ลงทะเบียน</button></div>
        </div>
      </div>
    </div>
  );
}

// ==================== USERS MANAGEMENT ====================
function UsersPage({ users, setUsers, currentUser }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editTarget, setEditTarget] = useState(null);
  const [newU, setNewU] = useState({username:'',password:'',name:'',email:'',role:'staff'});
  const [editU, setEditU] = useState(null);

  const addUser = () => {
    if (!newU.username || !newU.password || !newU.name) return alert('กรุณากรอกข้อมูลให้ครบ');
    if (users.find(u=>u.username===newU.username)) return alert('Username นี้มีอยู่แล้ว');
    const id = 'U' + String(Date.now()).slice(-5);
    setUsers(prev=>[...prev,{...newU,id,active:true}]);
    setNewU({username:'',password:'',name:'',email:'',role:'staff'});
    setShowAdd(false);
  };

  const openEdit = (u) => { setEditTarget(u); setEditU({...u, password:''}); };

  const saveEdit = () => {
    if (!editU.name) return alert('กรุณากรอกชื่อ');
    const dupUser = users.find(u=>u.username===editU.username && u.id!==editTarget.id);
    if (dupUser) return alert('Username นี้มีอยู่แล้ว');
    setUsers(prev=>prev.map(u=>u.id===editTarget.id ? {
      ...u,
      name: editU.name,
      username: editU.username,
      email: editU.email,
      role: editU.role,
      ...(editU.password ? {password: editU.password} : {})
    } : u));
    setEditTarget(null); setEditU(null);
  };

  const toggleActive = (id) => {
    if (id === currentUser.id) return alert('ไม่สามารถปิดการใช้งานบัญชีตัวเองได้');
    setUsers(prev=>prev.map(u=>u.id===id?{...u,active:!u.active}:u));
  };

  const deleteUser = (u) => {
    if (u.id === currentUser.id) return alert('ไม่สามารถลบบัญชีตัวเองได้');
    if (!window.confirm(`ลบผู้ใช้ "${u.name}" (${u.username}) ถาวร?`)) return;
    setUsers(prev=>prev.filter(x=>x.id!==u.id));
  };

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{fontSize:13,color:'var(--text3)'}}>ผู้ใช้งาน: <b style={{color:'var(--green)'}}>{users.filter(u=>u.active).length}</b> ใช้งาน / {users.length} ทั้งหมด</div>
        <button className="btn btn-gold" onClick={()=>setShowAdd(true)}>+ เพิ่มผู้ใช้ใหม่</button>
      </div>
      <div style={{display:'grid',gap:10}}>
        {users.map(u=>(
          <div key={u.id} className="user-card">
            <div className={`avatar ${u.role==='admin'?'':'avatar-blue'}`} style={{width:44,height:44,fontSize:18,flexShrink:0}}>
              {u.role==='admin'?'👑':'👤'}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3,flexWrap:'wrap'}}>
                <span style={{fontFamily:'Rajdhani',fontSize:16,color:'var(--text)'}}>{u.name}</span>
                <span className={`badge ${u.role==='admin'?'badge-gold':'badge-blue'}`}>{u.role==='admin'?'Admin':'Staff'}</span>
                <span className={`badge ${u.active?'badge-green':'badge-red'}`}>{u.active?'ใช้งาน':'ปิดใช้'}</span>
              </div>
              <div style={{fontSize:12,color:'var(--text3)'}}>
                <span style={{marginRight:12}}>👤 {u.username}</span>
                {u.email && <span style={{marginRight:12}}>📧 {u.email}</span>}
                <span>🔑 {u.id}</span>
              </div>
            </div>
            <div style={{display:'flex',gap:6,flexShrink:0}}>
              <button className="btn btn-blue" style={{fontSize:11,padding:'5px 10px'}} onClick={()=>openEdit(u)}>✏️ แก้ไข</button>
              {u.id !== currentUser.id ? (
                <>
                  <button className={`btn ${u.active?'btn-red':''}`} style={{fontSize:11,padding:'5px 10px'}} onClick={()=>toggleActive(u.id)}>
                    {u.active?'🔒 ปิด':'🔓 เปิด'}
                  </button>
                  <button className="btn btn-red" style={{fontSize:11,padding:'5px 10px'}} onClick={()=>deleteUser(u)}>🗑️</button>
                </>
              ) : (
                <span style={{fontSize:11,color:'var(--text3)',alignSelf:'center',padding:'0 4px'}}>(ฉัน)</span>
              )}
            </div>
          </div>
        ))}
      </div>

      {/* Edit Modal */}
      {editTarget && editU && (
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setEditTarget(null)}>
          <div className="modal">
            <div className="modal-head">
              <span style={{fontFamily:'Rajdhani',color:'var(--blue)',fontSize:17}}>✏️ แก้ไขผู้ใช้: {editTarget.name}</span>
              <button className="close-btn" onClick={()=>setEditTarget(null)}>✕</button>
            </div>
            <div className="modal-body">
              {[['ชื่อ-นามสกุล *','name','text'],['Username *','username','text'],['Password ใหม่ (เว้นว่าง = ไม่เปลี่ยน)','password','password'],['อีเมล','email','email']].map(([l,k,t])=>(
                <div className="form-row" key={k}>
                  <label className="form-label">{l}</label>
                  <input className="input" type={t} value={editU[k]||''} onChange={e=>setEditU(p=>({...p,[k]:e.target.value}))} placeholder={l}/>
                </div>
              ))}
              <div className="form-row">
                <label className="form-label">บทบาท (Role)</label>
                <div style={{display:'flex',gap:8}}>
                  <button className={`btn ${editU.role==='admin'?'btn-gold':''}`} style={{flex:1}}
                    disabled={editTarget.id===currentUser.id}
                    onClick={()=>setEditU(u=>({...u,role:'admin'}))}>👑 Admin</button>
                  <button className={`btn ${editU.role==='staff'?'btn-blue':''}`} style={{flex:1}}
                    disabled={editTarget.id===currentUser.id}
                    onClick={()=>setEditU(u=>({...u,role:'staff'}))}>👤 Staff</button>
                </div>
              </div>
              <div style={{display:'flex',gap:8,marginTop:16}}>
                <button className="btn btn-gold" style={{flex:1}} onClick={saveEdit}>💾 บันทึก</button>
                <button className="btn" onClick={()=>setEditTarget(null)}>ยกเลิก</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Add User Modal */}
      {showAdd && (
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}>
          <div className="modal">
            <div className="modal-head">
              <span style={{fontFamily:'Rajdhani',color:'var(--gold)'}}>+ เพิ่มผู้ใช้งานใหม่</span>
              <button className="close-btn" onClick={()=>setShowAdd(false)}>✕</button>
            </div>
            <div className="modal-body">
              {[['ชื่อ-นามสกุล *','name','text'],['Username *','username','text'],['Password *','password','password'],['อีเมล','email','email']].map(([l,k,t])=>(
                <div className="form-row" key={k}>
                  <label className="form-label">{l}</label>
                  <input className="input" type={t} value={newU[k]} onChange={e=>setNewU(p=>({...p,[k]:e.target.value}))} placeholder={l}/>
                </div>
              ))}
              <div className="form-row">
                <label className="form-label">บทบาท (Role)</label>
                <div style={{display:'flex',gap:8}}>
                  <button className={`btn ${newU.role==='admin'?'btn-gold':''}`} style={{flex:1}} onClick={()=>setNewU(u=>({...u,role:'admin'}))}>👑 Admin</button>
                  <button className={`btn ${newU.role==='staff'?'btn-blue':''}`} style={{flex:1}} onClick={()=>setNewU(u=>({...u,role:'staff'}))}>👤 Staff</button>
                </div>
              </div>
              <div style={{display:'flex',gap:8,marginTop:16}}>
                <button className="btn btn-gold" style={{flex:1}} onClick={addUser}>+ บันทึก</button>
                <button className="btn" onClick={()=>setShowAdd(false)}>ยกเลิก</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ==================== SETTINGS ====================
function SettingsPage({ shop, setShop }) {
  const [form, setForm] = useState({...shop});
  const [saved, setSaved] = useState(false);

  const save = () => {
    setShop(form);
    setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  };

  return (
    <div>
      <div className="settings-section">
        <div className="settings-title">🏪 ข้อมูลร้านค้า</div>
        <div className="grid2">
          {[
            ['ชื่อร้าน (สั้น)','name'],
            ['ชื่อนิติบุคคล','nameTh'],
            ['เลขที่ผู้เสียภาษี (13 หลัก)','taxId'],
            ['เบอร์โทรศัพท์','phone'],
            ['Line Official','line'],
            ['อีเมล','email'],
          ].map(([l,k])=>(
            <div className="form-row" key={k}>
              <label className="form-label">{l}</label>
              <input className="input" value={form[k]||''} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} placeholder={l}/>
            </div>
          ))}
        </div>
        <div className="form-row">
          <label className="form-label">ที่อยู่ร้าน (เต็ม)</label>
          <textarea className="input" rows={3} value={form.address||''} onChange={e=>setForm(f=>({...f,address:e.target.value}))} style={{resize:'vertical'}}/>
        </div>
        <button className="btn btn-gold" style={{padding:'10px 24px'}} onClick={save}>
          {saved ? '✅ บันทึกแล้ว!' : '💾 บันทึกข้อมูล'}
        </button>
      </div>
      <div className="settings-section">
        <div className="settings-title">📄 ตัวอย่างหัวเอกสาร</div>
        <div style={{background:'white',color:'#111',padding:16,borderRadius:8,fontSize:12}}>
          <div style={{fontWeight:700,fontSize:16}}>🏎️ {form.nameTh||form.name}</div>
          <div style={{color:'#555',marginTop:4,fontSize:11}}>
            {form.address}<br/>
            โทร: {form.phone} | {form.email}<br/>
            เลขที่ผู้เสียภาษี: <b>{form.taxId}</b>
          </div>
        </div>
      </div>
    </div>
  );
}

// ==================== MAIN APP ====================
const ALL_PAGES = [
  {id:'dashboard', label:'แดชบอร์ด', icon:'📊', roles:['admin','staff']},
  {id:'pos', label:'หน้าขาย (POS)', icon:'🛒', roles:['admin','staff']},
  {id:'stock', label:'จัดการสต็อก', icon:'📦', roles:['admin','staff']},
  {id:'products', label:'สินค้าและบาร์โค้ด', icon:'🏷️', roles:['admin','staff']},
  {id:'warranty', label:'ประกันสินค้า', icon:'🛡️', roles:['admin','staff']},
  {id:'reports', label:'รายงาน', icon:'📈', roles:['admin']},
  {id:'users', label:'จัดการผู้ใช้', icon:'👥', roles:['admin']},
  {id:'settings', label:'ตั้งค่าร้านค้า', icon:'⚙️', roles:['admin']},
];

function App() {
  const [user, setUser] = useState(null);
  const [users, setUsers] = useLocalStorage('benz_users', USERS_DEFAULT);
  const [page, setPage] = useState('dashboard');
  const [products, setProducts] = useLocalStorage('benz_products', INIT_PRODUCTS);
  const [sales, setSales] = useLocalStorage('benz_sales', INIT_SALES);
  const [shop, setShop] = useLocalStorage('benz_shop', SHOP_INFO_DEFAULT);
  const [warranties, setWarranties] = useLocalStorage('benz_warranties', INIT_WARRANTIES);
  const [stockLog, setStockLog] = useLocalStorage('benz_stock_log', STOCK_LOG_INIT);
  const [time, setTime] = useState(new Date());

  useEffect(() => {
    const t = setInterval(() => setTime(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  if (!user) return (
    <>
      <style>{css}</style>
      <LoginPage users={users} onLogin={(u) => { setUser(u); setPage('dashboard'); }}/>
    </>
  );

  const PAGES = ALL_PAGES.filter(p => p.roles.includes(user.role));
  const current = PAGES.find(p => p.id === page) || PAGES[0];
  const lowStockCount = products.filter(p => p.stock < 10).length;

  const logout = () => {
    setUser(null);
    setPage('dashboard');
  };

  return (
    <>
      <style>{css}</style>
      <div className="app">
        <div className="sidebar">
          <div className="logo">
            <div style={{fontSize:28,marginBottom:4}}>🏎️</div>
            <div className="logo-title">BENZ</div>
            <div className="gold-line"/>
            <div className="logo-sub">ประดับยนต์</div>
          </div>
          <div className="nav">
            <div className="nav-section">เมนูหลัก</div>
            {PAGES.filter(p=>['dashboard','pos','stock','products','warranty'].includes(p.id)).map(p => (
              <div key={p.id} className={`nav-item ${current.id===p.id?'active':''}`} onClick={()=>setPage(p.id)}>
                <span className="nav-icon">{p.icon}</span>
                <span className="nav-label">{p.label}</span>
                {p.id==='stock' && lowStockCount>0 && <span className="nav-badge">{lowStockCount}</span>}
              </div>
            ))}
            {user.role === 'admin' && (
              <>
                <div className="nav-section">จัดการระบบ</div>
                {PAGES.filter(p=>['reports','users','settings'].includes(p.id)).map(p => (
                  <div key={p.id} className={`nav-item ${current.id===p.id?'active':''}`} onClick={()=>setPage(p.id)}>
                    <span className="nav-icon">{p.icon}</span>
                    <span className="nav-label">{p.label}</span>
                  </div>
                ))}
              </>
            )}
          </div>
          <div className="status-bar">
            <span className="status-dot"/>ออนไลน์
            <div style={{marginTop:4}}>{time.toLocaleTimeString('th-TH')}</div>
            <div style={{marginTop:2,fontSize:10}}>{new Date().toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'})}</div>
          </div>
        </div>

        <div className="main">
          <div className="topbar">
            <div className="page-title">{current?.icon} {current?.label}</div>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <span style={{fontSize:12,color:'var(--text3)'}}>{new Date().toLocaleDateString('th-TH',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</span>
              <div style={{display:'flex',alignItems:'center',gap:8,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 12px'}}>
                <div className={`avatar ${user.role==='admin'?'':'avatar-blue'}`} style={{width:28,height:28,fontSize:14}}>
                  {user.role==='admin'?'👑':'👤'}
                </div>
                <div>
                  <div style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{user.name}</div>
                  <div style={{fontSize:10,color:'var(--text3)'}}>{user.role==='admin'?'Admin':'Staff'}</div>
                </div>
              </div>
              <button className="btn btn-red" style={{fontSize:11,padding:'6px 12px'}} onClick={logout}>
                ออกจากระบบ
              </button>
            </div>
          </div>
          <div className="content">
            {current.id==='dashboard' && <Dashboard products={products} sales={sales}/>}
            {current.id==='pos' && <POS products={products} setProducts={setProducts} sales={sales} setSales={setSales} user={user} shop={shop}/>}
            {current.id==='stock' && <Stock products={products} setProducts={setProducts} user={user} log={stockLog} setLog={setStockLog}/>}
            {current.id==='products' && <Products products={products} setProducts={setProducts}/>}
            {current.id==='warranty' && <Warranty products={products} warranties={warranties} setWarranties={setWarranties}/>}
            {current.id==='reports' && <Reports products={products} sales={sales} shop={shop}/>}
            {current.id==='users' && user.role==='admin' && <UsersPage users={users} setUsers={setUsers} currentUser={user}/>}
            {current.id==='settings' && user.role==='admin' && <SettingsPage shop={shop} setShop={setShop}/>}
          </div>
        </div>
      </div>
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
